<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>أكريلي | تفاصيل الإعلان</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
  <style>
    :root{--green:#10b981;--green-light:#34d399;--green-dark:#059669;--green-glow:rgba(16,185,129,0.25);--bg:#040c08;--bg2:#071810;--border:rgba(16,185,129,0.12);--text:#f0fdf4;--text-muted:#86efac;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;padding-bottom:90px;}
    .bg-scene{position:fixed;inset:0;z-index:0;pointer-events:none;}
    .orb{position:absolute;border-radius:50%;filter:blur(120px);}
    .orb1{width:500px;height:500px;background:radial-gradient(circle,rgba(16,185,129,0.08),transparent);top:-150px;right:-150px;}
    .orb2{width:400px;height:400px;background:radial-gradient(circle,rgba(5,46,22,0.4),transparent);bottom:-150px;left:-100px;}
    .grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(16,185,129,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(16,185,129,0.02) 1px,transparent 1px);background-size:60px 60px;z-index:0;}
    nav{position:fixed;top:0;width:100%;z-index:100;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;background:rgba(4,12,8,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
    .nav-back{display:flex;align-items:center;gap:8px;color:var(--text-muted);text-decoration:none;font-size:14px;font-weight:700;transition:color 0.3s;}
    .nav-back:hover{color:var(--green-light);}
    .nav-logo{font-size:20px;font-weight:900;background:linear-gradient(135deg,var(--green-light),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-decoration:none;}

    .page{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:80px 20px 20px;}

    /* Hero image */
    .hero-img{width:100%;height:360px;border-radius:24px;overflow:hidden;position:relative;margin-bottom:24px;border:1px solid var(--border);}
    .hero-img img{width:100%;height:100%;object-fit:cover;}
    .hero-img-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(4,12,8,0.85) 0%,transparent 50%);}
    .hero-badge{position:absolute;top:16px;right:16px;padding:6px 14px;border-radius:10px;font-size:12px;font-weight:700;background:rgba(16,185,129,0.9);color:white;}
    .hero-fav{position:absolute;top:16px;left:16px;width:38px;height:38px;border-radius:10px;background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;transition:all 0.3s;}
    .hero-fav:hover{background:rgba(239,68,68,0.3);border-color:#ef4444;}

    /* Info card */
    .info-card{background:linear-gradient(145deg,rgba(7,24,16,0.85),rgba(4,12,8,0.95));border:1px solid var(--border);border-radius:24px;padding:28px;margin-bottom:20px;backdrop-filter:blur(10px);}
    .listing-title{font-size:26px;font-weight:900;margin-bottom:12px;line-height:1.3;}
    .listing-meta{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:20px;}
    .meta-tag{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:100px;background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.15);font-size:12px;color:var(--text-muted);}
    .meta-tag i{color:var(--green);font-size:11px;}
    .price-row{display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-top:1px solid rgba(16,185,129,0.08);border-bottom:1px solid rgba(16,185,129,0.08);margin-bottom:20px;}
    .price-big{font-size:32px;font-weight:900;color:var(--green-light);}
    .price-big small{font-size:14px;color:rgba(134,239,172,0.4);font-weight:400;}
    .price-note{font-size:12px;color:rgba(134,239,172,0.35);text-align:left;}
    .desc-title{font-size:16px;font-weight:800;margin-bottom:12px;color:var(--green-light);}
    .desc-text{font-size:14px;color:rgba(240,253,244,0.65);line-height:1.8;}

    /* Contact card */
    .contact-card{background:linear-gradient(145deg,rgba(7,24,16,0.85),rgba(4,12,8,0.95));border:1px solid rgba(16,185,129,0.2);border-radius:24px;padding:28px;margin-bottom:20px;}
    .contact-title{font-size:16px;font-weight:800;margin-bottom:20px;color:var(--green-light);}
    .owner-row{display:flex;align-items:center;gap:14px;margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid rgba(16,185,129,0.08);}
    .owner-avatar{width:52px;height:52px;border-radius:16px;background:linear-gradient(135deg,rgba(16,185,129,0.2),rgba(5,46,22,0.4));border:1px solid rgba(16,185,129,0.2);display:flex;align-items:center;justify-content:center;font-size:22px;}
    .owner-name{font-size:16px;font-weight:800;}
    .owner-since{font-size:12px;color:rgba(134,239,172,0.4);margin-top:2px;}
    .contact-btns{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    .btn-contact{padding:14px;border-radius:14px;font-family:'Cairo',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.3s;display:flex;align-items:center;justify-content:center;gap:8px;text-decoration:none;}
    .btn-primary{background:linear-gradient(135deg,var(--green),var(--green-dark));border:none;color:white;box-shadow:0 6px 25px var(--green-glow);}
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 35px var(--green-glow);}
    .btn-secondary{background:transparent;border:1px solid rgba(16,185,129,0.2);color:var(--text-muted);}
    .btn-secondary:hover{border-color:var(--green);color:var(--green-light);background:rgba(16,185,129,0.05);}

    /* Safety */
    .safety-card{background:rgba(16,185,129,0.04);border:1px solid rgba(16,185,129,0.1);border-radius:16px;padding:16px 20px;display:flex;align-items:flex-start;gap:12px;}
    .safety-card i{color:var(--green);font-size:18px;margin-top:2px;flex-shrink:0;}
    .safety-text{font-size:12px;color:rgba(134,239,172,0.5);line-height:1.6;}

    /* Loading */
    .loading-page{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;color:rgba(134,239,172,0.4);}
    .spinner{width:40px;height:40px;border:3px solid rgba(16,185,129,0.15);border-top-color:var(--green);border-radius:50%;animation:spin 0.8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* Bottom Nav */
    .bottom-nav{position:fixed;bottom:0;width:100%;background:rgba(4,12,8,0.96);backdrop-filter:blur(20px);border-top:1px solid var(--border);padding:12px 0 20px;z-index:100;display:flex;justify-content:space-around;}
    .bnav-item{text-align:center;font-size:10px;color:rgba(134,239,172,0.35);cursor:pointer;transition:all 0.3s;flex:1;text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:4px;}
    .bnav-item:hover{color:var(--green-light);}
    .bnav-item i{font-size:18px;}
    .bnav-add{width:50px;height:50px;border-radius:16px;margin-top:-20px;background:linear-gradient(135deg,var(--green),var(--green-dark));display:flex;align-items:center;justify-content:center;font-size:22px;text-decoration:none;color:white;box-shadow:0 8px 30px var(--green-glow);}

    @media(max-width:768px){.hero-img{height:240px;}.contact-btns{grid-template-columns:1fr;}.listing-title{font-size:20px;}}
  </style>
</head>
<body>
<div class="bg-scene"><div class="orb orb1"></div><div class="orb orb2"></div></div>
<div class="grid-bg"></div>

<nav>
  <a href="listings.html" class="nav-back"><i class="fa-solid fa-arrow-right"></i> رجوع</a>
  <a href="index.html" class="nav-logo">أكريلي</a>
</nav>

<div class="page">
  <div id="content">
    <div class="loading-page">
      <div class="spinner"></div>
      <p>جاري تحميل الإعلان...</p>
    </div>
  </div>
</div>

<div class="bottom-nav">
  <a href="index.html" class="bnav-item"><i class="fa-solid fa-house"></i>الرئيسية</a>
  <a href="listings.html" class="bnav-item"><i class="fa-solid fa-list"></i>الإعلانات</a>
  <a href="create-listing.html" class="bnav-add"><i class="fa-solid fa-plus"></i></a>
  <a href="messages.html" class="bnav-item"><i class="fa-regular fa-message"></i>الرسائل</a>
  <a href="login.html" class="bnav-item"><i class="fa-regular fa-user"></i>حسابي</a>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey:"AIzaSyDXp0NC0dV0QHFzWwovlEczI44wlJUEdSw",
    authDomain:"ekrilidz-af404.firebaseapp.com",
    projectId:"ekrilidz-af404",
    storageBucket:"ekrilidz-af404.firebasestorage.app",
    messagingSenderId:"945902801388",
    appId:"1:945902801388:web:05ee5a76725edf9d4df0c9"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const params = new URLSearchParams(window.location.search);
  const listingId = params.get('id');

  let favorites = JSON.parse(localStorage.getItem('ekr_favs') || '[]');

  async function loadListing() {
    if (!listingId) { showError(); return; }
    try {
      const snap = await getDoc(doc(db, "listings", listingId));
      if (!snap.exists()) { showError(); return; }
      const d = snap.data();
      renderListing(listingId, d);
    } catch(e) { showError(); }
  }

  function renderListing(id, d) {
    const isFav = favorites.includes(id);
    document.getElementById('content').innerHTML = `
      <div class="hero-img">
        <img src="${d.imageUrl||'https://images.unsplash.com/photo-1600585154526-990dced4db0d?q=80&w=1200&auto=format&fit=crop'}" alt="${d.title}"/>
        <div class="hero-img-overlay"></div>
        <div class="hero-badge">✅ موثق</div>
        <div class="hero-fav ${isFav?'active':''}" id="favBtn" onclick="toggleFav('${id}')">${isFav?'❤️':'🤍'}</div>
      </div>

      <div class="info-card">
        <h1 class="listing-title">${d.title}</h1>
        <div class="listing-meta">
          <div class="meta-tag"><i class="fa-solid fa-location-dot"></i>${d.city||'الجزائر'}</div>
          <div class="meta-tag"><i class="fa-solid fa-tag"></i>${d.category||'عام'}</div>
          <div class="meta-tag"><i class="fa-regular fa-clock"></i>إعلان حديث</div>
        </div>
        <div class="price-row">
          <div>
            <div class="price-big">${Number(d.price).toLocaleString('ar-EG')} دج <small>/ الليلة</small></div>
          </div>
          <div class="price-note">السعر قابل<br>للتفاوض</div>
        </div>
        <div class="desc-title">وصف الإعلان</div>
        <div class="desc-text">${d.description||'لا يوجد وصف تفصيلي لهذا الإعلان.'}</div>
      </div>

      <div class="contact-card">
        <div class="contact-title">تواصل مع صاحب الإعلان</div>
        <div class="owner-row">
          <div class="owner-avatar">👤</div>
          <div>
            <div class="owner-name">صاحب الإعلان</div>
            <div class="owner-since">عضو موثق في أكريلي</div>
          </div>
        </div>
        <div class="contact-btns">
          <a href="messages.html?listing=${id}" class="btn-contact btn-primary">
            <i class="fa-regular fa-message"></i> إرسال رسالة
          </a>
          <a href="tel:" class="btn-contact btn-secondary">
            <i class="fa-solid fa-phone"></i> اتصال مباشر
          </a>
        </div>
      </div>

      <div class="safety-card">
        <i class="fa-solid fa-shield-halved"></i>
        <div class="safety-text">
          <strong style="color:var(--green-light);">نصيحة الأمان:</strong> لا تدفع أي مبلغ قبل التحقق من الإعلان شخصياً. أكريلي لا تطلب منك أي دفع مسبق.
        </div>
      </div>
    `;
  }

  function showError() {
    document.getElementById('content').innerHTML = `
      <div style="text-align:center;padding:80px 20px;color:rgba(134,239,172,0.4);">
        <i class="fa-regular fa-face-sad-cry" style="font-size:48px;display:block;margin-bottom:16px;color:rgba(16,185,129,0.2);"></i>
        <h3 style="color:rgba(240,253,244,0.6);margin-bottom:8px;">الإعلان غير موجود</h3>
        <p>ربما تم حذفه أو انتهت صلاحيته</p>
        <a href="listings.html" style="display:inline-block;margin-top:20px;padding:12px 28px;background:linear-gradient(135deg,var(--green),var(--green-dark));border-radius:12px;color:white;text-decoration:none;font-weight:700;">تصفح الإعلانات</a>
      </div>`;
  }

  window.toggleFav = (id) => {
    const idx = favorites.indexOf(id);
    if (idx > -1) favorites.splice(idx, 1); else favorites.push(id);
    localStorage.setItem('ekr_favs', JSON.stringify(favorites));
    const btn = document.getElementById('favBtn');
    if (btn) {
      btn.classList.toggle('active', favorites.includes(id));
      btn.textContent = favorites.includes(id) ? '❤️' : '🤍';
    }
  };

  loadListing();
</script>
</body>
</html>
