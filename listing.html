<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>أكريلي - الإعلانات</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Cairo', sans-serif;
      color: #e2e8f0;
      background: linear-gradient(120deg, #0b1220, #0f172a);
      background-attachment: fixed;
      padding-bottom: 100px;
      min-height: 100vh;
    }

    /* Header */
    header {
      padding: 20px;
      text-align: center;
      background: rgba(15,23,42,0.9);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid rgba(59,130,246,0.2);
    }

    header h1 {
      font-size: 28px;
      background: linear-gradient(135deg, #3b82f6, #10b981);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 5px;
    }

    header p {
      font-size: 12px;
      color: #94a3b8;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 20px;
    }

    /* البحث والفلاتر */
    .search-section {
      margin-bottom: 25px;
      background: rgba(31,41,55,0.8);
      padding: 20px;
      border-radius: 12px;
      border: 1px solid rgba(59,130,246,0.15);
    }

    .search-box {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }

    input, select {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(31,41,55,0.7);
      color: white;
      outline: none;
      font-family: 'Cairo', sans-serif;
      font-size: 14px;
      transition: 0.3s;
    }

    input:focus, select:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 10px rgba(59,130,246,0.3);
    }

    input::placeholder { color: #64748b; }

    .filter-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }

    /* الكارد */
    .listings-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .card {
      background: rgba(31,41,55,0.8);
      border-radius: 15px;
      overflow: hidden;
      border: 1px solid rgba(59,130,246,0.15);
      transition: all 0.3s;
      cursor: pointer;
    }

    .card:hover {
      border-color: rgba(59,130,246,0.4);
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(59,130,246,0.2);
    }

    .card-img {
      width: 100%;
      height: 200px;
      background: linear-gradient(135deg, #1f2937, #111827);
      object-fit: cover;
      position: relative;
    }

    .card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .badge {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(16,185,129,0.9);
      color: white;
      padding: 6px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: bold;
    }

    .card-content {
      padding: 15px;
    }

    .card-title {
      font-weight: bold;
      font-size: 16px;
      margin-bottom: 8px;
      line-height: 1.3;
    }

    .card-price {
      color: #10b981;
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .card-meta {
      font-size: 13px;
      color: #cbd5e1;
      display: flex;
      gap: 15px;
      margin-bottom: 12px;
    }

    .card-description {
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 12px;
      line-height: 1.4;
    }

    .card-buttons {
      display: flex;
      gap: 8px;
    }

    .btn-view {
      flex: 1;
      padding: 10px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      font-family: 'Cairo', sans-serif;
      font-size: 12px;
      transition: 0.3s;
    }

    .btn-view:hover {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
    }

    .btn-fav {
      flex: 0.3;
      padding: 10px;
      background: rgba(245,158,11,0.2);
      color: #fbbf24;
      border: 1px solid #f59e0b;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      transition: 0.3s;
    }

    .btn-fav:hover {
      background: rgba(245,158,11,0.4);
    }

    .btn-fav.active {
      background: #f59e0b;
      color: white;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #94a3b8;
    }

    .empty-state h3 {
      font-size: 22px;
      color: #e2e8f0;
      margin-bottom: 10px;
    }

    /* Bottom Navigation */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: rgba(15,23,42,0.95);
      backdrop-filter: blur(15px);
      display: flex;
      justify-content: space-around;
      padding: 12px 0 20px 0;
      border-top: 1px solid rgba(59,130,246,0.2);
      z-index: 99;
    }

    .nav-item {
      text-align: center;
      font-size: 11px;
      cursor: pointer;
      color: #64748b;
      transition: 0.3s;
      flex: 1;
    }

    .nav-item:hover, .nav-item.active {
      color: #3b82f6;
      font-weight: bold;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #3b82f6;
      font-size: 18px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(59,130,246,0.2);
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 768px) {
      .listings-grid {
        grid-template-columns: 1fr;
      }
      .filter-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

<header>
  <h1>🏠 أكريلي</h1>
  <p>استكشف أفضل الإقامات والمنازل</p>
</header>

<div class="container">
  <!-- Search & Filter -->
  <div class="search-section">
    <div class="search-box">
      <input id="searchInput" type="text" placeholder="ابحث عن منزل..." oninput="filterListings()">
    </div>
    <div class="filter-row">
      <select id="cityFilter" onchange="filterListings()">
        <option value="">📍 كل المدن</option>
        <option value="الجزائر">الجزائر</option>
        <option value="تيبازة">تيبازة</option>
        <option value="وهران">وهران</option>
        <option value="بجاية">بجاية</option>
        <option value="عنابة">عنابة</option>
      </select>
      <select id="typeFilter" onchange="filterListings()">
        <option value="">🏠 كل الأنواع</option>
        <option value="villa">Villa</option>
        <option value="apartment">Apartment</option>
        <option value="cabin">Cabin</option>
        <option value="house">House</option>
      </select>
      <select id="priceFilter" onchange="filterListings()">
        <option value="">💰 كل الأسعار</option>
        <option value="0-50000">أقل من 50,000 دج</option>
        <option value="50000-100000">50,000 - 100,000 دج</option>
        <option value="100000-500000">100,000 - 500,000 دج</option>
        <option value="500000">أكثر من 500,000 دج</option>
      </select>
    </div>
  </div>

  <!-- Listings Grid -->
  <div id="listingsContainer" class="listings-grid"></div>

  <!-- Empty State -->
  <div id="emptyState" class="empty-state" style="display: none;">
    <h3>📭 لا توجد إعلانات</h3>
    <p>حاول تغيير المرشحات أو العودة لاحقاً</p>
  </div>

  <!-- Loading -->
  <div id="loadingState" class="loading" style="display: none;">
    <div class="spinner"></div>
    <p>جاري التحميل...</p>
  </div>
</div>

<!-- Bottom Navigation -->
<div class="bottom-nav">
  <div class="nav-item active" onclick="navigateTo('listings.html')">🏠 الإعلانات</div>
  <div class="nav-item" onclick="navigateTo('favorites.html')">❤️ المفضلة</div>
  <div class="nav-item" onclick="navigateTo('messages.html')">💬 الرسائل</div>
  <div class="nav-item" onclick="navigateTo('profile.html')">👤 البروفيل</div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-firestore.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDXp0NC0dV0QHFzWwovlEczI44wlJUEdSw",
    authDomain: "ekrilidz-af404.firebaseapp.com",
    projectId: "ekrilidz-af404",
    storageBucket: "ekrilidz-af404.firebasestorage.app",
    messagingSenderId: "945902801388",
    appId: "1:945902801388:web:5a79223f369ee0544df0c9",
    measurementId: "G-P19FP8BLJQ"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  let allListings = [];
  let favorites = JSON.parse(localStorage.getItem('favorites')) || [];

  // Load Listings from Firebase
  async function loadListings() {
    const loadingEl = document.getElementById('loadingState');
    loadingEl.style.display = 'block';

    try {
      const snapshot = await db.collection('listings').get();
      allListings = [];
      snapshot.forEach(doc => {
        allListings.push({
          id: doc.id,
          ...doc.data()
        });
      });
      filterListings();
    } catch (error) {
      console.error('خطأ في تحميل الإعلانات:', error);
      showEmptyState();
    } finally {
      loadingEl.style.display = 'none';
    }
  }

  // Filter & Display
  function filterListings() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const city = document.getElementById('cityFilter').value;
    const type = document.getElementById('typeFilter').value;
    const priceRange = document.getElementById('priceFilter').value;

    let filtered = allListings.filter(listing => {
      const matchSearch = !search || listing.title.toLowerCase().includes(search) || 
                         (listing.description && listing.description.toLowerCase().includes(search));
      const matchCity = !city || listing.city === city;
      const matchType = !type || listing.type === type;
      
      let matchPrice = true;
      if (priceRange) {
        const price = listing.price;
        if (priceRange === '0-50000') matchPrice = price < 50000;
        if (priceRange === '50000-100000') matchPrice = price >= 50000 && price < 100000;
        if (priceRange === '100000-500000') matchPrice = price >= 100000 && price < 500000;
        if (priceRange === '500000') matchPrice = price >= 500000;
      }

      return matchSearch && matchCity && matchType && matchPrice;
    });

    displayListings(filtered);
  }

  function displayListings(listings) {
    const container = document.getElementById('listingsContainer');
    const emptyState = document.getElementById('emptyState');

    if (listings.length === 0) {
      container.innerHTML = '';
      emptyState.style.display = 'block';
      return;
    }

    emptyState.style.display = 'none';
    container.innerHTML = listings.map(listing => `
      <div class="card">
        <div class="card-img" style="position: relative;">
          <img src="${listing.image || 'https://images.unsplash.com/photo-1566073771259-6a8506099945?auto=format&fit=crop&w=400'}" alt="${listing.title}">
          <span class="badge">✅ موثق</span>
        </div>
        <div class="card-content">
          <div class="card-title">${listing.title}</div>
          <div class="card-price">${listing.price.toLocaleString('ar-EG')} دج/ليلة</div>
          <div class="card-meta">
            <span>📍 ${listing.city}</span>
            <span>🏠 ${listing.type}</span>
          </div>
          <div class="card-description">${listing.description.substring(0, 60)}...</div>
          <div class="card-buttons">
            <button class="btn-view" onclick="viewListing('${listing.id}')">عرض التفاصيل</button>
            <button class="btn-fav ${favorites.includes(listing.id) ? 'active' : ''}" 
                    onclick="toggleFavorite('${listing.id}')">❤️</button>
          </div>
        </div>
      </div>
    `).join('');
  }

  function toggleFavorite(listingId) {
    const index = favorites.indexOf(listingId);
    if (index > -1) {
      favorites.splice(index, 1);
    } else {
      favorites.push(listingId);
    }
    localStorage.setItem('favorites', JSON.stringify(favorites));
    filterListings();
  }

  function viewListing(listingId) {
    localStorage.setItem('selectedListingId', listingId);
    window.location.href = 'listing-detail.html';
  }

  function showEmptyState() {
    document.getElementById('listingsContainer').innerHTML = '';
    document.getElementById('emptyState').style.display = 'block';
  }

  function navigateTo(page) {
    window.location.href = page;
  }

  // Load on start
  loadListings();
</script>

</body>
</html>
