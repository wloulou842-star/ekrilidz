<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إعلانات أكريلي</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; padding: 20px; text-align: center; }
        .card { background: #1e293b; padding: 20px; border-radius: 15px; margin: 15px auto; max-width: 500px; border: 1px solid #10b981; }
    </style>
</head>
<body>

    <h1>🏠 إعلانات أكريلي</h1>
    <div id="results">جاري تحميل الإعلانات...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDXp0NC0dV0QHFzWwovlEczI44wlJUEdSw",
            authDomain: "ekrilidz-af404.firebaseapp.com",
            projectId: "ekrilidz-af404",
            storageBucket: "ekrilidz-af404.firebasestorage.app",
            messagingSenderId: "945902801388",
            appId: "1:945902801388:web:5a79223f369ee0544df0c9"
        };
        const db = getFirestore(initializeApp(firebaseConfig));

        async function loadAds() {
            const resultsDiv = document.getElementById('results');
            const querySnapshot = await getDocs(collection(db, "properties"));
            resultsDiv.innerHTML = "";
            querySnapshot.forEach((doc) => {
                const p = doc.data();
                resultsDiv.innerHTML += `
                    <div class="card">
                        <h3>${p.title}</h3>
                        <p>📍 ${p.city}</p>
                        <p>${p.desc}</p>
                    </div>
                `;
            });
        }
        loadAds();
    </script>
</body>
</html>
