<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>أكريلي | الإعلانات</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
  <style>
    :root {
      --green:#10b981;--green-light:#34d399;--green-dark:#059669;
      --green-glow:rgba(16,185,129,0.25);--bg:#040c08;--bg2:#071810;
      --border:rgba(16,185,129,0.12);--text:#f0fdf4;--text-muted:#86efac;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;padding-bottom:90px;}
    .bg-scene{position:fixed;inset:0;z-index:0;pointer-events:none;}
    .orb{position:absolute;border-radius:50%;filter:blur(120px);animation:drift 14s ease-in-out infinite alternate;}
    .orb1{width:500px;height:500px;background:radial-gradient(circle,rgba(16,185,129,0.1),transparent);top:-200px;right:-150px;}
    .orb2{width:400px;height:400px;background:radial-gradient(circle,rgba(5,46,22,0.4),transparent);bottom:-150px;left:-100px;animation-delay:5s;}
    @keyframes drift{0%{transform:translate(0,0)}100%{transform:translate(30px,20px)}}
    .grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(16,185,129,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(16,185,129,0.02) 1px,transparent 1px);background-size:60px 60px;z-index:0;}
    nav{position:fixed;top:0;width:100%;z-index:100;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;background:rgba(4,12,8,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
    .nav-logo{font-size:22px;font-weight:900;background:linear-gradient(135deg,var(--green-light),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-decoration:none;}
    .nav-right{display:flex;gap:10px;align-items:center;}
    .nav-btn{padding:8px 18px;border-radius:10px;font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.3s;text-decoration:none;}
    .nav-ghost{background:transparent;border:1px solid var(--border);color:var(--text-muted);}
    .nav-ghost:hover{border-color:var(--green);color:var(--green-light);}
    .nav-fill{background:linear-gradient(135deg,var(--green),var(--green-dark));border:none;color:white;box-shadow:0 4px 20px var(--green-glow);}
    .page{position:relative;z-index:1;max-width:1300px;margin:0 auto;padding:90px 20px 20px;}
    .page-header{margin-bottom:24px;}
    .page-title{font-size:28px;font-weight:900;margin-bottom:4px;}
    .page-title span{color:var(--green);}
    .page-sub{font-size:13px;color:rgba(134,239,172,0.4);}
    .search-bar{display:flex;gap:10px;align-items:center;background:rgba(7,24,16,0.8);border:1px solid rgba(16,185,129,0.15);border-radius:14px;padding:12px 18px;margin-bottom:16px;backdrop-filter:blur(10px);}
    .search-bar i{color:rgba(16,185,129,0.5);}
    .search-bar input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:'Cairo',sans-serif;font-size:14px;}
    .search-bar input::placeholder{color:rgba(134,239,172,0.25);}
    .btn-clear{background:none;border:none;color:rgba(134,239,172,0.3);cursor:pointer;font-size:14px;transition:color 0.3s;}
    .btn-clear:hover{color:var(--green);}
    .filters-wrap{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;}
    .filter-chip{padding:8px 16px;border-radius:100px;font-family:'Cairo',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all 0.3s;background:rgba(7,24,16,0.8);border:1px solid rgba(16,185,129,0.1);color:rgba(134,239,172,0.5);}
    .filter-chip.active,.filter-chip:hover{background:rgba(16,185,129,0.12);border-color:rgba(16,185,129,0.35);color:var(--green-light);}
    .filters-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;}
    .f-select{padding:10px 14px;border-radius:10px;font-family:'Cairo',sans-serif;font-size:13px;background:rgba(7,24,16,0.8);border:1px solid rgba(16,185,129,0.1);color:var(--text-muted);outline:none;cursor:pointer;transition:all 0.3s;}
    .f-select:focus{border-color:var(--green);}
    .f-select option{background:var(--bg2);}
    .results-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
    .results-count{font-size:13px;color:rgba(134,239,172,0.4);}
    .results-count span{color:var(--green-light);font-weight:700;}
    .view-toggle{display:flex;gap:6px;}
    .view-btn{width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:transparent;color:rgba(134,239,172,0.4);cursor:pointer;transition:all 0.3s;display:flex;align-items:center;justify-content:center;}
    .view-btn.active{background:rgba(16,185,129,0.1);border-color:rgba(16,185,129,0.3);color:var(--green);}
    .listings-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:18px;}
    .listings-grid.list-view{grid-template-columns:1fr;}
    .listing-card{background:linear-gradient(145deg,rgba(7,24,16,0.85),rgba(4,12,8,0.95));border:1px solid var(--border);border-radius:20px;overflow:hidden;transition:all 0.35s;cursor:pointer;animation:fadeIn 0.4s ease both;}
    .listing-card:hover{border-color:rgba(16,185,129,0.35);transform:translateY(-6px);box-shadow:0 16px 50px rgba(16,185,129,0.12);}
    @keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    .card-img{position:relative;height:200px;overflow:hidden;}
    .card-img img{width:100%;height:100%;object-fit:cover;transition:transform 0.5s;}
    .listing-card:hover .card-img img{transform:scale(1.06);}
    .img-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(4,12,8,0.75) 0%,transparent 55%);}
    .card-badge{position:absolute;top:10px;right:10px;padding:4px 10px;border-radius:8px;font-size:11px;font-weight:700;background:rgba(16,185,129,0.9);color:white;}
    .card-fav{position:absolute;top:10px;left:10px;width:30px;height:30px;border-radius:8px;background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;transition:all 0.3s;z-index:2;}
    .card-fav:hover,.card-fav.active{background:rgba(239,68,68,0.3);border-color:#ef4444;}
    .card-body{padding:16px;}
    .card-title{font-size:15px;font-weight:800;margin-bottom:6px;line-height:1.3;}
    .card-meta{display:flex;gap:12px;margin-bottom:12px;}
    .card-meta span{font-size:12px;color:rgba(134,239,172,0.45);display:flex;align-items:center;gap:4px;}
    .card-meta i{color:var(--green);font-size:11px;}
    .card-footer{display:flex;align-items:center;justify-content:space-between;}
    .card-price{font-size:18px;font-weight:900;color:var(--green-light);}
    .card-price small{font-size:11px;color:rgba(134,239,172,0.35);font-weight:400;}
    .btn-detail{padding:7px 16px;border-radius:8px;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.2);color:var(--green-light);font-family:'Cairo',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all 0.3s;}
    .btn-detail:hover{background:rgba(16,185,129,0.2);}
    .listings-grid.list-view .listing-card{display:flex;}
    .listings-grid.list-view .card-img{width:220px;height:auto;flex-shrink:0;border-radius:0;}
    .listings-grid.list-view .card-body{flex:1;display:flex;flex-direction:column;justify-content:space-between;padding:20px;}
    .empty-state{text-align:center;padding:80px 20px;color:rgba(134,239,172,0.35);}
    .empty-state i{font-size:48px;color:rgba(16,185,129,0.2);margin-bottom:16px;display:block;}
    .empty-state h3{font-size:20px;color:rgba(240,253,244,0.6);margin-bottom:8px;}
    .skeleton{background:rgba(16,185,129,0.04);border:1px solid var(--border);border-radius:20px;height:300px;animation:shimmer 1.8s ease-in-out infinite;}
    @keyframes shimmer{0%,100%{opacity:0.3}50%{opacity:0.7}}
    .bottom-nav{position:fixed;bottom:0;width:100%;background:rgba(4,12,8,0.96);backdrop-filter:blur(20px);border-top:1px solid var(--border);padding:12px 0 20px;z-index:100;display:flex;justify-content:space-around;}
    .bnav-item{text-align:center;font-size:10px;color:rgba(134,239,172,0.35);cursor:pointer;transition:all 0.3s;flex:1;text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:4px;}
    .bnav-item.active,.bnav-item:hover{color:var(--green-light);}
    .bnav-item i{font-size:18px;}
    .bnav-add{width:50px;height:50px;border-radius:16px;margin-top:-20px;background:linear-gradient(135deg,var(--green),var(--green-dark));display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;box-shadow:0 8px 30px var(--green-glow);text-decoration:none;color:white;}
    @media(max-width:768px){.listings-grid{grid-template-columns:1fr;}.listings-grid.list-view .listing-card{flex-direction:column;}.listings-grid.list-view .card-img{width:100%;height:200px;}}
  </style>
</head>
<body>
<div class="bg-scene"><div class="orb orb1"></div><div class="orb orb2"></div></div>
<div class="grid-bg"></div>
<nav>
  <a href="index.html" class="nav-logo">أكريلي</a>
  <div class="nav-right">
    <a href="login.html" class="nav-btn nav-ghost">دخول</a>
    <a href="create-listing.html" class="nav-btn nav-fill">+ إعلان</a>
  </div>
</nav>
<div class="page">
  <div class="page-header">
    <h1 class="page-title">تصفح <span>الإعلانات</span></h1>
    <p class="page-sub">اكتشف آلاف الإعلانات في جميع ولايات الجزائر</p>
  </div>
  <div class="search-bar">
    <i class="fa-solid fa-magnifying-glass"></i>
    <input type="text" id="searchInput" placeholder="ابحث عن أي شيء..."/>
    <button class="btn-clear" onclick="clearSearch()"><i class="fa-solid fa-xmark"></i></button>
  </div>
  <div class="filters-wrap" id="catChips">
    <div class="filter-chip active" data-cat="">الكل</div>
    <div class="filter-chip" data-cat="عقارات">🏠 عقارات</div>
    <div class="filter-chip" data-cat="سيارات">🚗 سيارات</div>
    <div class="filter-chip" data-cat="إلكترونيات">📱 إلكترونيات</div>
    <div class="filter-chip" data-cat="أثاث">🛋️ أثاث</div>
    <div class="filter-chip" data-cat="وظائف">💼 وظائف</div>
    <div class="filter-chip" data-cat="خدمات">🔧 خدمات</div>
    <div class="filter-chip" data-cat="ملابس">👗 ملابس</div>
  </div>
  <div class="filters-row">
    <select class="f-select" id="wilayaFilter">
      <option value="">📍 كل الولايات</option>
      <option>الجزائر العاصمة</option><option>وهران</option><option>قسنطينة</option>
      <option>عنابة</option><option>بجاية</option><option>تيزي وزو</option>
      <option>سطيف</option><option>بليدة</option><option>جيجل</option><option>مستغانم</option>
      <option>تيبازة</option><option>المدية</option><option>البويرة</option>
    </select>
    <select class="f-select" id="priceFilter">
      <option value="">💰 كل الأسعار</option>
      <option value="0-50000">أقل من 50,000 دج</option>
      <option value="50000-100000">50,000 – 100,000 دج</option>
      <option value="100000-500000">100,000 – 500,000 دج</option>
      <option value="500000+">أكثر من 500,000 دج</option>
    </select>
    <select class="f-select" id="sortFilter">
      <option value="new">🕐 الأحدث</option>
      <option value="price-asc">💹 السعر تصاعدي</option>
      <option value="price-desc">💹 السعر تنازلي</option>
    </select>
  </div>
  <div class="results-bar">
    <div class="results-count">عُثر على <span id="countEl">0</span> إعلان</div>
    <div class="view-toggle">
      <button class="view-btn active" id="gridBtn" onclick="setView('grid')"><i class="fa-solid fa-grip"></i></button>
      <button class="view-btn" id="listBtn" onclick="setView('list')"><i class="fa-solid fa-list"></i></button>
    </div>
  </div>
  <div class="listings-grid" id="listingsGrid">
    <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
    <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
  </div>
  <div id="emptyState" class="empty-state" style="display:none;">
    <i class="fa-regular fa-folder-open"></i>
    <h3>لا توجد إعلانات</h3>
    <p>جرب تغيير الفلاتر أو ابحث بكلمة أخرى</p>
  </div>
</div>
<div class="bottom-nav">
  <a href="index.html" class="bnav-item"><i class="fa-solid fa-house"></i>الرئيسية</a>
  <a href="listings.html" class="bnav-item active"><i class="fa-solid fa-list"></i>الإعلانات</a>
  <a href="create-listing.html" class="bnav-add"><i class="fa-solid fa-plus"></i></a>
  <a href="messages.html" class="bnav-item"><i class="fa-regular fa-message"></i>الرسائل</a>
  <a href="login.html" class="bnav-item"><i class="fa-regular fa-user"></i>حسابي</a>
</div>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
  const firebaseConfig = {
    apiKey:"AIzaSyDXp0NC0dV0QHFzWwovlEczI44wlJUEdSw",
    authDomain:"ekrilidz-af404.firebaseapp.com",
    projectId:"ekrilidz-af404",
    storageBucket:"ekrilidz-af404.firebasestorage.app",
    messagingSenderId:"945902801388",
    appId:"1:945902801388:web:05ee5a76725edf9d4df0c9"
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  let allListings = [];
  let favorites = JSON.parse(localStorage.getItem('ekr_favs') || '[]');
  async function loadListings() {
    try {
      const q = query(collection(db,"listings"), orderBy("createdAt","desc"));
      const snap = await getDocs(q);
      allListings = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      applyFilters();
    } catch(e) {
      document.getElementById('listingsGrid').innerHTML = '<p style="color:rgba(239,68,68,0.6);grid-column:span 3;text-align:center;padding:40px;">فشل التحميل</p>';
    }
  }
  function applyFilters() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const cat = document.querySelector('.filter-chip.active')?.dataset.cat || '';
    const wilaya = document.getElementById('wilayaFilter').value;
    const priceRange = document.getElementById('priceFilter').value;
    const sort = document.getElementById('sortFilter').value;
    let filtered = allListings.filter(l => {
      const matchSearch = !search || l.title?.toLowerCase().includes(search) || l.description?.toLowerCase().includes(search);
      const matchCat = !cat || l.category === cat;
      const matchWilaya = !wilaya || l.city === wilaya;
      let matchPrice = true;
      if (priceRange) {
        const p = Number(l.price);
        if (priceRange==='0-50000') matchPrice = p < 50000;
        else if (priceRange==='50000-100000') matchPrice = p>=50000 && p<100000;
        else if (priceRange==='100000-500000') matchPrice = p>=100000 && p<500000;
        else if (priceRange==='500000+') matchPrice = p>=500000;
      }
      return matchSearch && matchCat && matchWilaya && matchPrice;
    });
    if (sort==='price-asc') filtered.sort((a,b)=>a.price-b.price);
    else if (sort==='price-desc') filtered.sort((a,b)=>b.price-a.price);
    renderListings(filtered);
  }
  function renderListings(list) {
    const grid = document.getElementById('listingsGrid');
    const empty = document.getElementById('emptyState');
    document.getElementById('countEl').textContent = list.length;
    if (!list.length) { grid.innerHTML=''; empty.style.display='block'; return; }
    empty.style.display='none';
    grid.innerHTML = list.map((l,i) => `
      <div class="listing-card" style="animation-delay:${i*0.05}s" onclick="location.href='listing-detail.html?id=${l.id}'">
        <div class="card-img">
          <img src="${l.imageUrl||'https://images.unsplash.com/photo-1600585154526-990dced4db0d?q=80&w=600&auto=format&fit=crop'}" alt="${l.title}" loading="lazy"/>
          <div class="img-overlay"></div>
          <div class="card-badge">موثق</div>
          <div class="card-fav ${favorites.includes(l.id)?'active':''}" onclick="toggleFav(event,'${l.id}')">
            ${favorites.includes(l.id)?'❤️':'🤍'}
          </div>
        </div>
        <div class="card-body">
          <div class="card-title">${l.title}</div>
          <div class="card-meta">
            <span><i class="fa-solid fa-location-dot"></i>${l.city||'الجزائر'}</span>
            <span><i class="fa-solid fa-tag"></i>${l.category||'عام'}</span>
          </div>
          <div class="card-footer">
            <div class="card-price">${Number(l.price).toLocaleString('ar-EG')} دج <small>/ الليلة</small></div>
            <button class="btn-detail">التفاصيل</button>
          </div>
        </div>
      </div>`).join('');
  }
  window.toggleFav = (e,id) => {
    e.stopPropagation();
    const idx = favorites.indexOf(id);
    if (idx>-1) favorites.splice(idx,1); else favorites.push(id);
    localStorage.setItem('ekr_favs',JSON.stringify(favorites));
    applyFilters();
  };
  window.applyFilters = applyFilters;
  document.getElementById('searchInput').addEventListener('input',applyFilters);
  document.getElementById('wilayaFilter').addEventListener('change',applyFilters);
  document.getElementById('priceFilter').addEventListener('change',applyFilters);
  document.getElementById('sortFilter').addEventListener('change',applyFilters);
  document.querySelectorAll('.filter-chip').forEach(chip => {
    chip.addEventListener('click',()=>{
      document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
      chip.classList.add('active');
      applyFilters();
    });
  });
  const params = new URLSearchParams(window.location.search);
  if (params.get('cat')) { document.querySelectorAll('.filter-chip').forEach(c=>{ if(c.dataset.cat===params.get('cat'))c.classList.add('active'); else c.classList.remove('active'); }); }
  if (params.get('q')) document.getElementById('searchInput').value = params.get('q');
  if (params.get('w')) document.getElementById('wilayaFilter').value = params.get('w');
  loadListings();
</script>
<script>
  function setView(type){
    const grid=document.getElementById('listingsGrid');
    document.getElementById('gridBtn').classList.toggle('active',type==='grid');
    document.getElementById('listBtn').classList.toggle('active',type==='list');
    grid.classList.toggle('list-view',type==='list');
  }
  function clearSearch(){
    document.getElementById('searchInput').value='';
    if(window.applyFilters)window.applyFilters();
  }
</script>
</body>
</html>
