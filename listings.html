<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>أكريلي | تفاصيل الإعلان الاحترافية</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
  <style>
    :root {
      --green: #10b981; --green-light: #34d399; --green-dark: #059669;
      --green-glow: rgba(16,185,129,0.25); --bg: #040c08; --bg2: #071810;
      --border: rgba(16,185,129,0.12); --text: #f0fdf4; --text-muted: #86efac;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Cairo',sans-serif; background:var(--bg); color:var(--text); overflow-x:hidden; padding-bottom:100px; }
    
    /* خلفية بريميوم */
    .bg-scene { position:fixed; inset:0; z-index:0; pointer-events:none; }
    .orb { position:absolute; border-radius:50%; filter:blur(120px); }
    .orb1 { width:500px; height:500px; background:radial-gradient(circle,rgba(16,185,129,0.08),transparent); top:-150px; right:-150px; }
    .orb2 { width:400px; height:400px; background:radial-gradient(circle,rgba(5,46,22,0.4),transparent); bottom:-150px; left:-100px; }
    .grid-bg { position:fixed; inset:0; background-image:linear-gradient(rgba(16,185,129,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(16,185,129,0.02) 1px,transparent 1px); background-size:60px 60px; z-index:0; }
    
    /* Navbar */
    nav { position:fixed; top:0; width:100%; z-index:100; padding:14px 24px; display:flex; align-items:center; justify-content:space-between; background:rgba(4,12,8,0.9); backdrop-filter:blur(20px); border-bottom:1px solid var(--border); }
    .nav-back { display:flex; align-items:center; gap:8px; color:var(--text-muted); text-decoration:none; font-size:14px; font-weight:700; transition:all 0.3s; }
    .nav-back:hover { color:var(--green-light); transform:translateX(3px); }
    .nav-logo { font-size:20px; font-weight:900; background:linear-gradient(135deg,var(--green-light),var(--green)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; text-decoration:none; }

    .page { position:relative; z-index:1; max-width:900px; margin:0 auto; padding:85px 20px 20px; }

    /* Slider المتطور للصور */
    .slider-container { width:100%; height:380px; border-radius:24px; overflow:hidden; position:relative; margin-bottom:24px; border:1px solid var(--border); background:#000; }
    .slider-track { display:flex; width:100%; height:100%; transition:transform 0.4s ease-in-out; }
    .slide { min-width:100%; height:100%; position:relative; }
    .slide img { width:100%; height:100%; object-fit:cover; }
    .hero-img-overlay { position:absolute; inset:0; background:linear-gradient(to top,rgba(4,12,8,0.9) 0%,transparent 60%); pointer-events:none; }
    
    /* أزرار السلايدر والتحكم */
    .slider-btn { position:absolute; top:50%; transform:translateY(-50%); width:40px; height:40px; border-radius:12px; background:rgba(0,0,0,0.6); border:1px solid rgba(255,255,255,0.1); color:white; display:flex; align-items:center; justify-content:center; cursor:pointer; z-index:5; transition:all 0.3s; }
    .slider-btn:hover { background:var(--green); border-color:var(--green-light); }
    .slider-next { right:16px; } .slider-prev { left:16px; }
    .slider-dots { position:absolute; bottom:16px; left:50%; transform:translateX(-50%); display:flex; gap:6px; z-index:5; }
    .dot { width:8px; height:8px; border-radius:50%; background:rgba(255,255,255,0.4); cursor:pointer; transition:all 0.3s; }
    .dot.active { background:var(--green-light); width:20px; border-radius:4px; }

    /* عائمات فوق الصورة */
    .top-badges { position:absolute; top:16px; right:16px; display:flex; gap:8px; z-index:6; }
    .hero-badge { padding:6px 14px; border-radius:10px; font-size:11px; font-weight:700; background:rgba(16,185,129,0.9); color:white; backdrop-filter:blur(5px); }
    .action-floats { position:absolute; top:16px; left:16px; display:flex; gap:8px; z-index:6; }
    .float-btn { width:38px; height:38px; border-radius:10px; background:rgba(0,0,0,0.6); border:1px solid rgba(255,255,255,0.1); display:flex; align-items:center; justify-content:center; font-size:16px; cursor:pointer; transition:all 0.3s; color:white; }
    .float-btn:hover { background:rgba(16,185,129,0.2); border-color:var(--green); }
    .float-btn.fav-btn.active { background:rgba(239,68,68,0.25); border-color:#ef4444; color:#ef4444; }

    /* الكروت والمعلومات */
    .info-card, .contact-card { background:linear-gradient(145deg,rgba(7,24,16,0.85),rgba(4,12,8,0.95)); border:1px solid var(--border); border-radius:24px; padding:28px; margin-bottom:20px; backdrop-filter:blur(10px); box-shadow:0 10px 30px rgba(0,0,0,0.2); }
    .listing-title { font-size:26px; font-weight:900; margin-bottom:12px; line-height:1.4; color:#fff; }
    .listing-meta { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:20px; }
    .meta-tag { display:flex; align-items:center; gap:6px; padding:6px 14px; border-radius:100px; background:rgba(16,185,129,0.06); border:1px solid rgba(16,185,129,0.12); font-size:12px; color:var(--text-muted); }
    .meta-tag i { color:var(--green); }
    
    .price-row { display:flex; align-items:center; justify-content:space-between; padding:18px 0; border-top:1px solid rgba(16,185,129,0.08); border-bottom:1px solid rgba(16,185,129,0.08); margin-bottom:20px; }
    .price-big { font-size:32px; font-weight:900; color:var(--green-light); letter-spacing:-0.5px; }
    .price-big small { font-size:14px; color:rgba(134,239,172,0.4); font-weight:400; margin-right:4px; }
    .price-note { font-size:12px; color:rgba(134,239,172,0.4); text-align:left; line-height:1.4; background:rgba(16,185,129,0.05); padding:6px 12px; border-radius:8px; border:1px solid rgba(16,185,129,0.1); }
    
    .desc-title, .contact-title { font-size:16px; font-weight:800; margin-bottom:12px; color:var(--green-light); display:flex; align-items:center; gap:8px; }
    .desc-text { font-size:14px; color:rgba(240,253,244,0.7); line-height:1.9; white-space: pre-line; }

    /* كرت الاتصال والمؤجر */
    .owner-row { display:flex; align-items:center; gap:14px; margin-bottom:20px; padding-bottom:20px; border-bottom:1px solid rgba(16,185,129,0.08); }
    .owner-avatar { width:52px; height:52px; border-radius:16px; background:linear-gradient(135deg,rgba(16,185,129,0.15),rgba(5,46,22,0.4)); border:1px solid rgba(16,185,129,0.2); display:flex; align-items:center; justify-content:center; font-size:22px; }
    .owner-name { font-size:16px; font-weight:800; color:#fff; }
    .owner-since { font-size:12px; color:rgba(134,239,172,0.4); margin-top:2px; }
    
    .contact-btns { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .btn-contact { padding:14px; border-radius:14px; font-family:'Cairo',sans-serif; font-size:14px; font-weight:700; cursor:pointer; transition:all 0.3s; display:flex; align-items:center; justify-content:center; gap:8px; text-decoration:none; }
    .btn-primary { background:linear-gradient(135deg,var(--green),var(--green-dark)); border:none; color:white; box-shadow:0 6px 25px var(--green-glow); }
    .btn-primary:hover { transform:translateY(-2px); box-shadow:0 10px 35px var(--green-glow); }
    .btn-secondary { background:transparent; border:1px solid rgba(16,185,129,0.2); color:var(--text-muted); }
    .btn-secondary:hover { border-color:var(--green); color:var(--green-light); background:rgba(16,185,129,0.05); transform:translateY(-2px); }

    /* كرت الأمان */
    .safety-card { background:rgba(16,185,129,0.03); border:1px solid rgba(16,185,129,0.08); border-radius:18px; padding:16px 20px; display:flex; align-items:flex-start; gap:12px; }
    .safety-card i { color:var(--green); font-size:18px; margin-top:2px; flex-shrink:0; }
    .safety-text { font-size:12px; color:rgba(134,239,172,0.45); line-height:1.7; }

    /* الـ Skeletons المضيئة الاحترافية */
    .sk-loader { display:flex; flex-direction:column; gap:20px; }
    .sk-anim { background:linear-gradient(90deg, rgba(16,185,129,0.04) 25%, rgba(16,185,129,0.09) 50%, rgba(16,185,129,0.04) 75%); background-size:200% 100%; animation:shimmer 1.4s infinite linear; }
    @keyframes shimmer { 0% { background-position:200% 0; } 100% { background-position:-200% 0; } }
    .sk-img { width:100%; height:380px; border-radius:24px; }
    .sk-card { height:220px; border-radius:24px; }

    /* Bottom Nav */
    .bottom-nav { position:fixed; bottom:0; width:100%; background:rgba(4,12,8,0.96); backdrop-filter:blur(20px); border-top:1px solid var(--border); padding:12px 0 20px; z-index:100; display:flex; justify-content:space-around; }
    .bnav-item { text-align:center; font-size:10px; color:rgba(134,239,172,0.35); cursor:pointer; transition:all 0.3s; flex:1; text-decoration:none; display:flex; flex-direction:column; align-items:center; gap:4px; }
    .bnav-item.active, .bnav-item:hover { color:var(--green-light); }
    .bnav-item i { font-size:18px; }
    .bnav-add { width:50px; height:50px; border-radius:16px; margin-top:-20px; background:linear-gradient(135deg,var(--green),var(--green-dark)); display:flex; align-items:center; justify-content:center; font-size:22px; text-decoration:none; color:white; box-shadow:0 8px 30px var(--green-glow); }

    @media(max-width:768px){ .slider-container{height:250px;} .sk-img{height:250px;} .contact-btns{grid-template-columns:1fr;} .listing-title{font-size:20px;} }
  </style>
</head>
<body>

<div class="bg-scene"><div class="orb orb1"></div><div class="orb orb2"></div></div>
<div class="grid-bg"></div>

<nav>
  <a href="listings.html" class="nav-back"><i class="fa-solid fa-arrow-right"></i> رجوع</a>
  <a href="index.html" class="nav-logo">أكريلي</a>
</nav>

<div class="page">
  <div id="content">
    <!-- هيكل التحميل الاحترافي قبل ما يجيب البيانات من الفايربيز -->
    <div class="sk-loader">
      <div class="sk-img sk-anim"></div>
      <div class="sk-card sk-anim"></div>
    </div>
  </div>
</div>

<div class="bottom-nav">
  <a href="index.html" class="bnav-item"><i class="fa-solid fa-house"></i>الرئيسية</a>
  <a href="listings.html" class="bnav-item active"><i class="fa-solid fa-list"></i>الإعلانات</a>
  <a href="create-listing.html" class="bnav-add"><i class="fa-solid fa-plus"></i></a>
  <a href="messages.html" class="bnav-item"><i class="fa-regular fa-message"></i>الرسائل</a>
  <a href="login.html" class="bnav-item"><i class="fa-regular fa-user"></i>حسابي</a>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey:"AIzaSyDXp0NC0dV0QHFzWwovlEczI44wlJUEdSw",
    authDomain:"ekrilidz-af404.firebaseapp.com",
    projectId:"ekrilidz-af404",
    storageBucket:"ekrilidz-af404.firebasestorage.app",
    messagingSenderId:"945902801388",
    appId:"1:945902801388:web:05ee5a76725edf9d4df0c9"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const params = new URLSearchParams(window.location.search);
  const listingId = params.get('id');

  let favorites = JSON.parse(localStorage.getItem('ekr_favs') || '[]');
  let currentSlide = 0;
  let totalSlides = 0;

  async function loadListing() {
    if (!listingId) { showError(); return; }
    try {
      const snap = await getDoc(doc(db, "listings", listingId));
      if (!snap.exists()) { showError(); return; }
      renderListing(listingId, snap.data());
    } catch(e) { showError(); }
  }

  function renderListing(id, d) {
    const isFav = favorites.includes(id);
    
    // دعم الصور المتعددة: إذا كانت مصفوفة images موجودة نديها، وإلا نديروا تصويرة imageUrl في مصفوفة واحدة
    const imagesArray = d.images && d.images.length ? d.images : [d.imageUrl || 'https://images.unsplash.com/photo-1600585154526-990dced4db0d?q=80&w=1200&auto=format&fit=crop'];
    totalSlides = imagesArray.length;

    document.getElementById('content').innerHTML = `
      <!-- معرض الصور الاحترافي المتنقل -->
      <div class="slider-container">
        <div class="slider-track" id="sliderTrack" style="transform: translateX(0px);">
          ${imagesArray.map(imgUrl => `
            <div class="slide">
              <img src="${imgUrl}" alt="${d.title}" loading="lazy"/>
              <div class="hero-img-overlay"></div>
            </div>
          `).join('')}
        </div>
        
        ${totalSlides > 1 ? `
          <button class="slider-btn slider-next" onclick="moveSlide(1)"><i class="fa-solid fa-chevron-right"></i></button>
          <button class="slider-btn slider-prev" onclick="moveSlide(-1)"><i class="fa-solid fa-chevron-left"></i></button>
          <div class="slider-dots">
            ${imagesArray.map((_, idx) => `<div class="dot ${idx===0?'active':''}" onclick="setSlide(${idx})"></div>`).join('')}
          </div>
        ` : ''}

        <div class="top-badges">
          <div class="hero-badge">✅ موثق</div>
        </div>

        <div class="action-floats">
          <button class="float-btn fav-btn ${isFav?'active':''}" id="favBtn" onclick="toggleFav('${id}')">
            <i class="${isFav?'fa-solid fa-heart':'fa-regular fa-heart'}"></i>
          </button>
          <button class="float-btn" onclick="shareListing('${d.title}')">
            <i class="fa-solid fa-share-nodes"></i>
          </button>
        </div>
      </div>

      <!-- كرت تفاصيل الإعلان -->
      <div class="info-card">
        <h1 class="listing-title">${d.title}</h1>
        <div class="listing-meta">
          <div class="meta-tag"><i class="fa-solid fa-location-dot"></i>${d.city || 'الجزائر'}</div>
          <div class="meta-tag"><i class="fa-solid fa-tag"></i>${d.category || 'عام'}</div>
          <div class="meta-tag"><i class="fa-regular fa-clock"></i>إعلان حديث</div>
        </div>
        <div class="price-row">
          <div>
            <div class="price-big">${Number(d.price).toLocaleString('fr-FR')} <small>دج / الليلة</small></div>
          </div>
          <div class="price-note">السعر قابل<br>للتفاوض</div>
        </div>
        <div class="desc-title"><i class="fa-solid fa-align-right"></i> وصف الإعلان</div>
        <div class="desc-text">${d.description || 'لا يوجد وصف تفصيلي لهذا الإعلان.'}</div>
      </div>

      <!-- كرت الاتصال والمؤجر مصلح بالكامل -->
      <div class="contact-card">
        <div class="contact-title"><i class="fa-regular fa-user"></i> تواصل مع صاحب الإعلان</div>
        <div class="owner-row">
          <div class="owner-avatar">👤</div>
          <div>
            <div class="owner-name">${d.ownerName || 'صاحب الإعلان'}</div>
            <div class="owner-since">عضو موثق في منصة أكريلي</div>
          </div>
        </div>
        <div class="contact-btns">
          <a href="messages.html?listing=${id}" class="btn-contact btn-primary">
            <i class="fa-regular fa-message"></i> إرسال رسالة شات
          </a>
          <!-- الـ href تم ربطه ببيانات الـ Firebase ديناميكياً برقم المؤجر -->
          <a href="tel:${d.phone || ''}" class="btn-contact btn-secondary">
            <i class="fa-solid fa-phone"></i> اتصال مباشر
          </a>
        </div>
      </div>

      <div class="safety-card">
        <i class="fa-solid fa-shield-halved"></i>
        <div class="safety-text">
          <strong style="color:var(--green-light);">نصيحة الأمان لأكريلي:</strong> لا تدفع أي مبالغ أو عربون مسبق قبل معاينة العقار أو السلعة والتحقق منها شخصياً لتفادي أي احتيال.
        </div>
      </div>
    `;
  }

  function showError() {
    document.getElementById('content').innerHTML = `
      <div style="text-align:center;padding:80px 20px;color:rgba(134,239,172,0.4);">
        <i class="fa-regular fa-face-sad-cry" style="font-size:48px;display:block;margin-bottom:16px;color:rgba(16,185,129,0.2);"></i>
        <h3 style="color:rgba(240,253,244,0.6);margin-bottom:8px;">الإعلان غير موجود</h3>
        <p>ربما تم حذفه من قبل صاحبه أو انتهت صلاحيته</p>
        <a href="listings.html" style="display:inline-block;margin-top:20px;padding:12px 28px;background:linear-gradient(135deg,var(--green),var(--green-dark));border-radius:12px;color:white;text-decoration:none;font-weight:700;">العودة لتصفح الإعلانات</a>
      </div>`;
  }

  // ربط الفونكسيونات بالـ Window (Global Scope) باش الـ HTML يقدر يقرأهم
  window.toggleFav = (id) => {
    const idx = favorites.indexOf(id);
    if (idx > -1) favorites.splice(idx, 1); else favorites.push(id);
    localStorage.setItem('ekr_favs', JSON.stringify(favorites));
    const btn = document.getElementById('favBtn');
    if (btn) {
      btn.classList.toggle('active', favorites.includes(id));
      const icon = btn.querySelector('i');
      if(icon) icon.className = favorites.includes(id) ? 'fa-solid fa-heart' : 'fa-regular fa-heart';
    }
  };

  window.moveSlide = (direction) => {
    currentSlide += direction;
    if (currentSlide >= totalSlides) currentSlide = 0;
    if (currentSlide < 0) currentSlide = totalSlides - 1;
    updateSlider();
  };

  window.setSlide = (index) => {
    currentSlide = index;
    updateSlider();
  };

  function updateSlider() {
    const track = document.getElementById('sliderTrack');
    // بما أن اتجاه الصفحة هو RTL، فالتنقل يكون بالموجب (+) وليس بالسالب (-) في الـ transform
    if(track) track.style.transform = `translateX(${currentSlide * 100}%)`;
    
    document.querySelectorAll('.dot').forEach((dot, idx) => {
      dot.classList.toggle('active', idx === currentSlide);
    });
  }

  window.shareListing = async (title) => {
    if (navigator.share) {
      try {
        await navigator.share({ title: title, text: `شوف هاد الإعلان على منصة أكريلي: ${title}`, url: window.location.href });
      } catch(e) { console.log('Share canceled'); }
    } else {
      navigator.clipboard.writeText(window.location.href);
      alert('تم نسخ رابط الإعلان، يمكنك مشاركته الآن!');
    }
  };

  loadListing();
</script>
<div class="bottom-nav">
  
  <a href="index.html" class="nav-link">
    <i class="fa-solid fa-house"></i>
    <span>الرئيسية</span>
  </a>

  <a href="listings.html" class="nav-link">
    <i class="fa-solid fa-compass"></i>
    <span>الإعلانات</span>
  </a>

  <a href="create-listing.html" class="nav-link">
    <i class="fa-solid fa-circle-plus"></i>
    <span>أضف إعلان</span>
  </a>

  <a href="login.html" class="nav-link">
    <i class="fa-regular fa-user"></i>
    <span>حسابي</span>
  </a>

</div>

</body>
</html>
