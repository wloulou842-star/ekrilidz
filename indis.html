
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>أكريلي Ekrili v0.3 - منصة كراء المنازل</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Cairo', sans-serif;
      color: #e2e8f0;
      background: linear-gradient(120deg, #0b1220, #0f172a);
      background-attachment: fixed;
      padding-bottom: 120px;
      min-height: 100vh;
    }

    header {
      padding: 18px;
      text-align: center;
      background: rgba(15,23,42,0.8);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid rgba(59,130,246,0.2);
    }

    header h1 {
      font-size: 26px;
      background: linear-gradient(135deg, #3b82f6, #10b981);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 4px;
    }

    header p { font-size: 12px; color: #94a3b8; }

    .container { max-width: 700px; margin: auto; padding: 15px; }

    .search-section { margin-bottom: 20px; }

    input, select {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(31,41,55,0.7);
      color: white;
      outline: none;
      font-family: 'Cairo', sans-serif;
      font-size: 14px;
      margin-bottom: 10px;
      transition: 0.3s;
    }

    input:focus, select:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 10px rgba(59,130,246,0.3);
    }

    input::placeholder { color: #64748b; }

    .filter-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 15px;
    }

    .card {
      background: rgba(31,41,55,0.8);
      backdrop-filter: blur(10px);
      padding: 0;
      border-radius: 15px;
      margin-bottom: 20px;
      border: 1px solid rgba(59,130,246,0.15);
      overflow: hidden;
      transition: all 0.3s;
    }

    .card:hover { border-color: rgba(59,130,246,0.4); transform: translateY(-3px); }

    .card.demo { opacity: 0.85; border: 1px dashed rgba(59,130,246,0.3); }

    .img-container {
      position: relative;
      width: 100%;
      height: 250px;
      background: linear-gradient(135deg, #1f2937, #111827);
      overflow: hidden;
    }

    .img { width: 100%; height: 100%; object-fit: cover; }
    
    .demo-badge {
      position: absolute;
      top: 12px;
      left: 12px;
      background: rgba(59,130,246,0.9);
      color: white;
      padding: 5px 12px;
      border-radius: 15px;
      font-size: 11px;
      font-weight: bold;
    }

    .promo-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: linear-gradient(135deg, #f59e0b, #d97706);
      color: white;
      padding: 6px 14px;
      border-radius: 15px;
      font-size: 12px;
      font-weight: bold;
      box-shadow: 0 4px 12px rgba(245,158,11,0.4);
    }

    .verified-badge {
      position: absolute;
      bottom: 12px;
      right: 12px;
      background: #10b981;
      color: white;
      padding: 5px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: bold;
    }

    .card-content { padding: 16px; }

    .title { 
      font-weight: bold;
      font-size: 16px;
      margin-bottom: 8px;
      line-height: 1.3;
    }

    .price {
      color: #10b981;
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .meta {
      font-size: 13px;
      color: #cbd5e1;
      margin-bottom: 10px;
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }

    .description {
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 12px;
      line-height: 1.4;
    }

    .demo-text {
      font-size: 11px;
      color: #3b82f6;
      font-style: italic;
      margin-top: 8px;
      padding: 8px;
      background: rgba(59,130,246,0.1);
      border-radius: 6px;
      border-right: 3px solid #3b82f6;
    }

    .actions {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
      border-top: 1px solid rgba(255,255,255,0.05);
      padding-top: 12px;
    }

    .btn-call {
      background: #10b981;
      padding: 10px;
      text-decoration: none;
      text-align: center;
      border-radius: 8px;
      color: white;
      font-weight: bold;
      transition: 0.3s;
      font-size: 12px;
      border: none;
      cursor: pointer;
    }

    .btn-call:hover { background: #059669; transform: translateY(-2px); }

    .btn-fav, .btn-edit, .btn-delete {
      padding: 10px;
      border-radius: 8px;
      color: white;
      font-weight: bold;
      border: none;
      cursor: pointer;
      transition: 0.3s;
      font-size: 12px;
    }

    .btn-fav { background: #f59e0b; }
    .btn-fav:hover { background: #d97706; }

    .btn-edit { background: #3b82f6; }
    .btn-edit:hover { background: #2563eb; }

    .btn-delete { background: #ef4444; }
    .btn-delete:hover { background: #dc2626; }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: rgba(15,23,42,0.95);
      backdrop-filter: blur(15px);
      display: flex;
      justify-content: space-around;
      padding: 12px 0 20px 0;
      border-top: 1px solid rgba(59,130,246,0.2);
      z-index: 99;
    }

    .nav-item {
      text-align: center;
      font-size: 11px;
      cursor: pointer;
      color: #64748b;
      transition: 0.3s;
      padding: 6px 10px;
    }

    .nav-item:hover, .nav-item.active { color: #3b82f6; font-weight: bold; }

    .empty-state {
      text-align: center;
      padding: 50px 20px;
      color: #94a3b8;
    }

    .empty-state h3 { margin-bottom: 10px; color: #e2e8f0; font-size: 18px; }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .modal.active { display: flex; }

    .modal-content {
      background: rgba(31,41,55,0.95);
      padding: 25px;
      border-radius: 15px;
      width: 100%;
      max-width: 400px;
      border: 1px solid rgba(59,130,246,0.2);
      max-height: 85vh;
      overflow-y: auto;
    }

    .modal-content h2 { margin-bottom: 15px; font-size: 18px; }

    .modal-content input, .modal-content select, .modal-content textarea {
      width: 100%;
      margin-bottom: 12px !important;
    }

    .modal-buttons { display: flex; gap: 10px; margin-top: 15px; }
    .modal-buttons button { flex: 1; padding: 10px !important; }

    .success-message {
      background: rgba(16,185,129,0.2);
      color: #4ade80;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 15px;
      border: 1px solid #4ade80;
      display: none;
      font-size: 13px;
    }

    .success-message.show { display: block; }

    .counter {
      text-align: center;
      padding: 15px;
      background: rgba(245,158,11,0.1);
      border-radius: 10px;
      margin-bottom: 20px;
      border: 1px solid rgba(245,158,11,0.3);
      color: #fbbf24;
      font-weight: bold;
      font-size: 14px;
    }

    @media (max-width: 600px) {
      .filter-row { grid-template-columns: 1fr; }
      .actions { grid-template-columns: 1fr; }
      header h1 { font-size: 22px; }
    }
  </style>
</head>
<body>

<header>
  <h1>🏠 أكريلي Ekrili</h1>
  <p>منصة كراء المنازل الجزائرية v0.3</p>
</header>

<div class="container">
  <div class="success-message" id="successMsg">✅ تم!</div>
  
  <div class="counter" id="counter">🎁 بقي <strong id="count">1000</strong> إعلان من العرض الترويجي</div>

  <div class="search-section">
    <input id="searchInput" placeholder="ابحث..." oninput="search()">
    
    <div class="filter-row">
      <select id="cityFilter" onchange="search()">
        <option value="">📍 كل الولايات</option>
        <option value="الجزائر">الجزائر</option>
        <option value="تيبازة">تيبازة</option>
        <option value="بومرداس">بومرداس</option>
        <option value="وهران">وهران</option>
        <option value="آين تموشنت">آين تموشنت</option>
        <option value="بجاية">بجاية</option>
        <option value="جيجل">جيجل</option>
        <option value="سكيكدة">سكيكدة</option>
        <option value="عنابة">عنابة</option>
        <option value="الطارف">الطارف</option>
        <option value="قسنطينة">قسنطينة</option>
        <option value="مسيلة">مسيلة</option>
        <option value="سطيف">سطيف</option>
        <option value="بسكرة">بسكرة</option>
      </select>
      <select id="typeFilter" onchange="search()">
        <option value="">🏠 كل الأنواع</option>
        <option value="F1">F1</option>
        <option value="F2">F2</option>
        <option value="F3">F3</option>
        <option value="F4">F4</option>
        <option value="Studio">Studio</option>
        <option value="Villa">Villa</option>
      </select>
    </div>
  </div>

  <div id="results"></div>
</div>

<div class="bottom-nav">
  <div class="nav-item active" onclick="showHome()">🏠 الرئيسية</div>
  <div class="nav-item" onclick="openAddModal()">➕ أضف</div>
  <div class="nav-item" onclick="showFavorites()">❤️ المفضلة</div>
  <div class="nav-item" onclick="showMyListings()">📋 إعلاناتي</div>
</div>

<div id="addModal" class="modal">
  <div class="modal-content">
    <h2 id="modalTitle">➕ إعلان جديد</h2>
    <input id="newTitle" placeholder="العنوان">
    <select id="newCity">
      <option value="الجزائر">الجزائر</option>
      <option value="تيبازة">تيبازة</option>
      <option value="بومرداس">بومرداس</option>
      <option value="وهران">وهران</option>
      <option value="بجاية">بجاية</option>
      <option value="جيجل">جيجل</option>
      <option value="عنابة">عنابة</option>
    </select>
    <select id="newType">
      <option value="F2">F2</option>
      <option value="F3">F3</option>
      <option value="Studio">Studio</option>
      <option value="Villa">Villa</option>
    </select>
    <input id="newPrice" type="number" placeholder="السعر (دج)">
    <input id="newPhone" placeholder="الهاتف">
    <textarea id="newDesc" placeholder="الوصف"></textarea>
    <div class="modal-buttons">
      <button onclick="saveProperty()" style="background: #10b981 !important;">نشر 🚀</button>
      <button onclick="closeAddModal()" style="background: #4b5563 !important;">إلغاء</button>
    </div>
  </div>
</div>

<script>
let myProperties = JSON.parse(localStorage.getItem("myProperties") || "[]");
let favorites = JSON.parse(localStorage.getItem("favorites") || "[]");
let currentView = "home";
let editingId = null;

const demoListings = [
  { id: 101, title: "F2 بحر تيبازة", city: "تيبازة", type: "F2", price: 250000, phone: "0550123456", description: "إطلالة بحر جميلة", isDemo: true, isPromo: true, rating: 5 },
  { id: 102, title: "Villa فخمة وهران", city: "وهران", type: "Villa", price: 450000, phone: "0551234567", description: "فيلا فاخرة مع حمام سباحة", isDemo: true, isPromo: true, rating: 5 },
  { id: 103, title: "F3 الجزائر", city: "الجزائر", type: "F3", price: 320000, phone: "0552345678", description: "قريبة من المترو", isDemo: true, isPromo: true, rating: 4 },
  { id: 104, title: "Studio بجاية", city: "بجاية", type: "Studio", price: 180000, phone: "0553456789", description: "خيار اقتصادي", isDemo: true, isPromo: true, rating: 4 },
  { id: 105, title: "F4 جيجل", city: "جيجل", type: "F4", price: 380000, phone: "0554567890", description: "عائلية واسعة", isDemo: true, isPromo: false, rating: 5 },
  { id: 106, title: "Villa عنابة", city: "عنابة", type: "Villa", price: 480000, phone: "0555678901", description: "فخمة جداً", isDemo: true, isPromo: false, rating: 5 },
];

function openAddModal() {
  editingId = null;
  document.getElementById("modalTitle").textContent = "➕ إعلان جديد";
  document.getElementById("newTitle").value = "";
  document.getElementById("newPrice").value = "";
  document.getElementById("newPhone").value = "";
  document.getElementById("newDesc").value = "";
  document.getElementById("addModal").classList.add("active");
}

function closeAddModal() {
  document.getElementById("addModal").classList.remove("active");
}

function showMessage(msg) {
  const el = document.getElementById("successMsg");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 1500);
}

function updateCounter() {
  const remaining = 1000 - myProperties.filter(p => p.isPromo).length;
  document.getElementById("count").textContent = Math.max(0, remaining);
}

function renderListings(listings) {
  const container = document.getElementById("results");
  container.innerHTML = "";

  if (listings.length === 0) {
    container.innerHTML = '<div class="empty-state"><h3>📭 لا توجد نتائج</h3></div>';
    return;
  }

  listings.forEach(p => {
    const card = document.createElement("div");
    card.className = "card" + (p.isDemo ? " demo" : "");

    const isFav = favorites.includes(p.id);
    const isOwner = myProperties.some(x => x.id === p.id);

    let demoHTML = p.isDemo ? '<div class="demo-badge">🎬 توضيحي</div>' : '';
    let promoHTML = p.isPromo ? '<div class="promo-badge">🎁 مجاني 3 سنين</div>' : '';

    let actions = `
      <a href="tel:${p.phone}" class="btn-call">📞 اتصل</a>
      <button class="btn-fav" onclick="toggleFav(${p.id})">${isFav ? '❤️' : '⭐'}</button>
    `;

    if (isOwner) {
      actions += `<button class="btn-delete" onclick="deleteProperty(${p.id})">🗑️</button>`;
    }

    card.innerHTML = `
      <div class="img-container">
        <img class="img" src="https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?auto=format&fit=crop&w=600&q=60">
        ${demoHTML}
        ${promoHTML}
        <div class="verified-badge">✅</div>
      </div>
      <div class="card-content">
        <div class="title">${p.title}</div>
        <div class="price">${p.price.toLocaleString('ar-EG')} دج</div>
        <div class="meta">
          <span>📍 ${p.city}</span>
          <span>🏠 ${p.type}</span>
        </div>
        <div class="description">${p.description}</div>
        ${p.isDemo ? '<div class="demo-text">(هذا اعلان توضيحي - جرب إضافة إعلانك)</div>' : ''}
        <div class="actions">${actions}</div>
      </div>
    `;

    container.appendChild(card);
  });
}

function search() {
  currentView = "home";
  updateNav();

  const q = document.getElementById("searchInput").value.toLowerCase();
  const city = document.getElementById("cityFilter").value;
  const type = document.getElementById("typeFilter").value;

  const all = [...demoListings, ...myProperties];
  
  let filtered = all.filter(p => {
    const matchCity = !city || p.city === city;
    const matchType = !type || p.type === type;
    const matchSearch = !q || p.title.toLowerCase().includes(q);
    return matchCity && matchType && matchSearch;
  });

  renderListings(filtered);
}

function toggleFav(id) {
  if (favorites.includes(id)) {
    favorites = favorites.filter(x => x !== id);
  } else {
    favorites.push(id);
  }
  localStorage.setItem("favorites", JSON.stringify(favorites));
  search();
}

function showFavorites() {
  currentView = "favorites";
  updateNav();
  const all = [...demoListings, ...myProperties];
  const favs = all.filter(p => favorites.includes(p.id));
  renderListings(favs);
}

function showMyListings() {
  currentView = "mylistings";
  updateNav();
  renderListings(myProperties);
}

function deleteProperty(id) {
  if (confirm("حذف؟")) {
    myProperties = myProperties.filter(p => p.id !== id);
    localStorage.setItem("myProperties", JSON.stringify(myProperties));
    updateCounter();
    showMessage("🗑️ تم الحذف");
    showMyListings();
  }
}

function saveProperty() {
  const title = document.getElementById("newTitle").value.trim();
  const city = document.getElementById("newCity").value;
  const type = document.getElementById("newType").value;
  const price = parseInt(document.getElementById("newPrice").value);
  const phone = document.getElementById("newPhone").value.trim();
  const desc = document.getElementById("newDesc").value.trim();

  if (!title || !price || !phone || !desc) {
    alert("⚠️ ملء جميع الحقول");
    return;
  }

  const prop = {
    id: Date.now(),
    title,
    city,
    type,
    price,
    phone,
    description: desc,
    isDemo: false,
    isPromo: myProperties.filter(p => p.isPromo).length < 1000,
    rating: 5
  };

  myProperties.push(prop);
  localStorage.setItem("myProperties", JSON.stringify(myProperties));
  updateCounter();
  closeAddModal();
  showMessage("🎉 تم النشر!");
  showMyListings();
}

function showHome() {
  currentView = "home";
  updateNav();
  document.getElementById("searchInput").value = "";
  document.getElementById("cityFilter").value = "";
  document.getElementById("typeFilter").value = "";
  search();
}

function updateNav() {
  document.querySelectorAll(".nav-item").forEach(el => el.classList.remove("active"));
  const navs = document.querySelectorAll(".nav-item");
  if (currentView === "home") navs[0].classList.add("active");
  if (currentView === "favorites") navs[2].classList.add("active");
  if (currentView === "mylistings") navs[3].classList.add("active");
}

updateCounter();
search();
</script>

</body>
</html>
