<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head><meta charset="UTF-8"><title>أكريلي - عرض المنازل</title></head>
<body>
    <h1>🏠 أكريلي</h1>
    <a href="owner.html">➕ إضافة إعلانك</a>
    <div id="results"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";
        
        const firebaseConfig = { /* انسخ نفس الـ config هنا */ };
        const db = getFirestore(initializeApp(firebaseConfig));

        const snapshot = await getDocs(collection(db, "properties"));
        snapshot.forEach(doc => {
            const p = doc.data();
            document.getElementById('results').innerHTML += `<div><h3>${p.title}</h3><p>${p.city}</p></div>`;
        });
    </script>
</body>
</html>
