<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>أكريلي Ekrili v0.2 - منصة كراء المنازل الذكية</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --glass: rgba(31, 41, 55, 0.7);
      --accent: #3b82f6;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --bg: #0b1220;
      --primary: #1e293b;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Cairo', sans-serif;
      color: #e2e8f0;
      background: linear-gradient(120deg, #0b1220, #0f172a);
      background-attachment: fixed;
      padding-bottom: 120px;
      min-height: 100vh;
    }

    /* ====== HEADER ====== */
    header {
      padding: 20px;
      text-align: center;
      background: linear-gradient(135deg, rgba(31,41,55,0.9), rgba(59,130,246,0.1));
      backdrop-filter: blur(15px);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 2px solid rgba(59,130,246,0.3);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    header h1 {
      font-size: 28px;
      margin-bottom: 5px;
      background: linear-gradient(135deg, #3b82f6, #10b981);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      font-size: 13px;
      color: #94a3b8;
    }

    /* ====== CONTAINER ====== */
    .container {
      max-width: 700px;
      margin: auto;
      padding: 15px;
    }

    /* ====== SEARCH & FILTER ====== */
    .search-section {
      margin-bottom: 25px;
    }

    .search-box {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }

    input, select {
      flex: 1;
      padding: 14px;
      border-radius: 12px;
      border: 2px solid rgba(255,255,255,0.1);
      background: var(--glass);
      color: white;
      outline: none;
      font-family: 'Cairo', sans-serif;
      font-size: 14px;
      transition: all 0.3s;
    }

    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
      background: rgba(31, 41, 55, 0.9);
    }

    input::placeholder {
      color: #64748b;
    }

    .filter-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .btn {
      padding: 14px 24px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), #2563eb);
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      font-family: 'Cairo', sans-serif;
      font-size: 14px;
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(59, 130, 246, 0.5);
    }

    .btn-secondary {
      background: var(--warning);
      box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3);
    }

    .btn-secondary:hover {
      background: #d97706;
    }

    /* ====== CARDS ====== */
    .card {
      background: linear-gradient(135deg, rgba(31,41,55,0.8), rgba(59,130,246,0.05));
      backdrop-filter: blur(20px);
      padding: 0;
      border-radius: 20px;
      margin-bottom: 25px;
      border: 1px solid rgba(59,130,246,0.2);
      box-shadow: 0 12px 40px rgba(0,0,0,0.4);
      transition: all 0.3s;
      overflow: hidden;
    }

    .card:hover {
      border-color: rgba(59, 130, 246, 0.5);
      box-shadow: 0 15px 50px rgba(59, 130, 246, 0.25);
      transform: translateY(-5px);
    }

    .img-container {
      position: relative;
      width: 100%;
      height: 280px;
      overflow: hidden;
      background: linear-gradient(135deg, #1f2937, #111827);
    }

    .img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s;
    }

    .card:hover .img {
      transform: scale(1.08);
    }

    /* شارة التوثيق */
    .verified-badge {
      position: absolute;
      top: 15px;
      right: 15px;
      background: linear-gradient(135deg, var(--success), #059669);
      color: white;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
      backdrop-filter: blur(10px);
    }

    .card-content {
      padding: 20px;
    }

    .title-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
      gap: 10px;
    }

    .title {
      font-weight: bold;
      font-size: 18px;
      flex: 1;
      line-height: 1.3;
    }

    /* نجوم التقييم */
    .rating {
      color: #f59e0b;
      font-size: 16px;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }

    .price {
      color: var(--success);
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 12px;
      background: rgba(16, 185, 129, 0.1);
      padding: 8px 12px;
      border-radius: 8px;
      display: inline-block;
    }

    .meta {
      font-size: 14px;
      color: #cbd5e1;
      margin-bottom: 12px;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .meta-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .description {
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 15px;
      line-height: 1.5;
      padding: 10px;
      background: rgba(15, 23, 42, 0.5);
      border-radius: 8px;
      border-right: 3px solid var(--accent);
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 15px;
    }

    .badge {
      background: rgba(59, 130, 246, 0.2);
      color: #93c5fd;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      border: 1px solid rgba(59, 130, 246, 0.3);
    }

    /* ====== ACTIONS ====== */
    .actions {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
      gap: 8px;
      margin-top: 15px;
      border-top: 1px solid rgba(255,255,255,0.1);
      padding-top: 15px;
    }

    .btn-call {
      background: linear-gradient(135deg, var(--success), #059669);
      padding: 12px;
      text-decoration: none;
      text-align: center;
      border-radius: 10px;
      color: white;
      font-weight: bold;
      transition: all 0.3s;
      font-size: 13px;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
    }

    .btn-call:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(16, 185, 129, 0.5);
    }

    .btn-fav {
      background: linear-gradient(135deg, var(--warning), #d97706);
      padding: 12px;
      border-radius: 10px;
      color: white;
      font-weight: bold;
      border: none;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 13px;
      box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3);
    }

    .btn-fav:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(245, 158, 11, 0.5);
    }

    .btn-edit {
      background: var(--accent);
      padding: 12px;
      border-radius: 10px;
      color: white;
      font-weight: bold;
      border: none;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 13px;
    }

    .btn-delete {
      background: var(--danger);
      padding: 12px;
      border-radius: 10px;
      color: white;
      font-weight: bold;
      border: none;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 13px;
    }

    .btn-edit:hover, .btn-delete:hover {
      transform: translateY(-2px);
    }

    /* ====== MODAL ====== */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: linear-gradient(135deg, #1f2937, #111827);
      padding: 30px;
      border-radius: 20px;
      width: 100%;
      max-width: 450px;
      border: 2px solid rgba(59,130,246,0.3);
      box-shadow: 0 25px 50px rgba(0,0,0,0.7);
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-content h2 {
      margin-bottom: 20px;
      color: white;
      font-size: 20px;
    }

    .modal-content input,
    .modal-content select,
    .modal-content textarea {
      width: 100%;
      margin-bottom: 15px !important;
      padding: 12px !important;
    }

    .modal-content textarea {
      resize: vertical;
      min-height: 80px;
    }

    .modal-buttons {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .modal-buttons button {
      flex: 1;
      padding: 12px !important;
    }

    .btn-cancel {
      background: #4b5563 !important;
    }

    /* ====== BOTTOM NAV ====== */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: linear-gradient(180deg, rgba(31,41,55,0.8), rgba(11,18,32,0.95));
      backdrop-filter: blur(20px);
      display: flex;
      justify-content: space-around;
      padding: 15px 0 25px 0;
      border-top: 2px solid rgba(59,130,246,0.3);
      z-index: 99;
      box-shadow: 0 -8px 32px rgba(0,0,0,0.4);
    }

    .nav-item {
      text-align: center;
      font-size: 12px;
      cursor: pointer;
      color: #64748b;
      transition: all 0.3s;
      padding: 8px 12px;
      border-radius: 10px;
    }

    .nav-item:hover {
      color: var(--accent);
      background: rgba(59,130,246,0.1);
    }

    .nav-item.active {
      color: var(--accent);
      background: rgba(59,130,246,0.2);
      font-weight: bold;
    }

    /* ====== EMPTY STATE ====== */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #94a3b8;
    }

    .empty-state h3 {
      margin-bottom: 10px;
      color: #e2e8f0;
      font-size: 20px;
    }

    .empty-state p {
      font-size: 14px;
    }

    /* ====== SUCCESS MESSAGE ====== */
    .success-message {
      background: linear-gradient(135deg, rgba(16,185,129,0.2), rgba(5,150,105,0.2));
      color: #4ade80;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
      border: 2px solid var(--success);
      display: none;
      font-weight: bold;
      animation: slideDown 0.3s ease;
    }

    .success-message.show {
      display: block;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ====== RESPONSIVE ====== */
    @media (max-width: 600px) {
      .filter-row {
        grid-template-columns: 1fr;
      }

      .actions {
        grid-template-columns: 1fr;
      }

      .title {
        font-size: 16px;
      }

      header h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>

<header>
  <h1>🏠 أكريلي Ekrili</h1>
  <p>منصة بحث ذكية عن المنازل الصيفية v0.2</p>
</header>

<div class="container">
  <div class="success-message" id="successMsg">✅ تم تنفيذ العملية بنجاح!</div>
  
  <div class="search-section">
    <div class="search-box">
      <input id="searchInput" placeholder="ابحث عن: بحر، رخيص، F3..." oninput="search()">
    </div>

    <div class="filter-row">
      <select id="cityFilter" onchange="search()">
        <option value="">📍 كل المدن</option>
        <option value="تيبازة">تيبازة</option>
        <option value="الجزائر">الجزائر</option>
        <option value="وهران">وهران</option>
        <option value="بجاية">بجاية</option>
      </select>
      <select id="typeFilter" onchange="search()">
        <option value="">🏠 كل الأنواع</option>
        <option value="F2">F2</option>
        <option value="F3">F3</option>
        <option value="studio">Studio</option>
        <option value="villa">Villa</option>
      </select>
    </div>
  </div>

  <div id="results"></div>
</div>

<!-- شريط التنقل السفلي -->
<div class="bottom-nav">
  <div class="nav-item active" onclick="showHome()">🏠<br>الرئيسية</div>
  <div class="nav-item" onclick="openAddModal()">➕<br>أضف منزل</div>
  <div class="nav-item" onclick="showFavorites()">❤️<br>المفضلة</div>
  <div class="nav-item" onclick="showMyListings()">📋<br>إعلاناتي</div>
</div>

<!-- Modal لإضافة/تعديل منزل -->
<div id="addModal" class="modal">
  <div class="modal-content">
    <h2 id="modalTitle">➕ إضافة منزل جديد</h2>
    
    <input id="newTitle" placeholder="عنوان الإعلان (مثلاً: F2 بإطلالة بحر)">
    
    <select id="newCity">
      <option value="الجزائر">الجزائر</option>
      <option value="تيبازة">تيبازة</option>
      <option value="وهران">وهران</option>
      <option value="بجاية">بجاية</option>
    </select>
    
    <select id="newType">
      <option value="F2">F2</option>
      <option value="F3">F3</option>
      <option value="studio">Studio</option>
      <option value="villa">Villa</option>
    </select>
    
    <input id="newPrice" type="number" placeholder="السعر (دج)">
    <input id="newPhone" placeholder="رقم الهاتف (مثلاً: 0550123456)">
    
    <textarea id="newDesc" placeholder="وصف الإعلان (المميزات، الموقع، إلخ)"></textarea>
    
    <input id="newImg" type="text" placeholder="رابط الصورة (optional)" value="https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?auto=format&fit=crop&w=800&q=60">
    
    <div class="modal-buttons">
      <button onclick="saveProperty()" id="saveBtn" style="background: var(--success) !important;">نشر الإعلان 🚀</button>
      <button class="btn-cancel" onclick="closeAddModal()">إلغاء</button>
    </div>
  </div>
</div>

<script>
// ====== DATA MANAGEMENT ======
let myProperties = JSON.parse(localStorage.getItem("myProperties") || "[]");
let favorites = JSON.parse(localStorage.getItem("favorites") || "[]");
let currentView = "home";
let editingId = null;

const baseListings = [
  { 
    id: 1, 
    title: "F2 بإطلالة بحر ساحرة + مسبح خاص", 
    city: "تيبازة", 
    type: "F2",
    price: 250000, 
    phone: "0550123456", 
    img: "https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?auto=format&fit=crop&w=800&q=60", 
    isVerified: true,
    rating: 5,
    description: "منزل فاخر مع إطلالة بحرية خلابة، مسبح خاص، حديقة كبيرة، واي فاي سريع"
  },
  { 
    id: 2, 
    title: "F3 قريبة من المترو + حديقة", 
    city: "الجزائر", 
    type: "F3",
    price: 320000, 
    phone: "0550765432", 
    img: "https://images.unsplash.com/photo-1502005229762-cf1b2da7c5d6?auto=format&fit=crop&w=800&q=60", 
    isVerified: true,
    rating: 4,
    description: "شقة عائلية وسط المدينة، قريبة من المدارس والمستشفيات، موقف سيارات"
  },
  { 
    id: 3, 
    title: "Studio اقتصادي للطلبة", 
    city: "وهران", 
    type: "studio",
    price: 180000, 
    phone: "0550987654", 
    img: "https://images.unsplash.com/photo-1502672260266-1c1ef2d93688?auto=format&fit=crop&w=800&q=60", 
    isVerified: true,
    rating: 3,
    description: "خيار ميسور التكلفة للطلبة، قريب من الجامعة، ملتقى طلاب ودي"
  },
  { 
    id: 4, 
    title: "Villa فخمة بحر وحمام سباحة", 
    city: "بجاية", 
    type: "villa",
    price: 450000, 
    phone: "0551234567", 
    img: "https://images.unsplash.com/photo-1564013799919-ab600027ffc6?auto=format&fit=crop&w=800&q=60", 
    isVerified: true,
    rating: 5,
    description: "فيلا فاخرة جداً على الشاطئ مباشرة، 4 غرف، حمام سباحة خاص، حديقة واسعة"
  }
];

// ====== UI FUNCTIONS ======
function openAddModal() {
  editingId = null;
  document.getElementById("modalTitle").textContent = "➕ إضافة منزل جديد";
  document.getElementById("saveBtn").textContent = "نشر الإعلان 🚀";
  document.getElementById("newTitle").value = "";
  document.getElementById("newPrice").value = "";
  document.getElementById("newPhone").value = "";
  document.getElementById("newDesc").value = "";
  document.getElementById("newImg").value = "https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?auto=format&fit=crop&w=800&q=60";
  document.getElementById("addModal").classList.add("active");
}

function closeAddModal() {
  document.getElementById("addModal").classList.remove("active");
  editingId = null;
}

function openEditModal(id) {
  const property = myProperties.find(p => p.id === id);
  if (!property) return;

  editingId = id;
  document.getElementById("modalTitle").textContent = "✏️ تعديل الإعلان";
  document.getElementById("saveBtn").textContent = "حفظ التعديلات";
  document.getElementById("newTitle").value = property.title;
  document.getElementById("newCity").value = property.city;
  document.getElementById("newType").value = property.type;
  document.getElementById("newPrice").value = property.price;
  document.getElementById("newPhone").value = property.phone;
  document.getElementById("newDesc").value = property.description;
  document.getElementById("newImg").value = property.img;
  document.getElementById("addModal").classList.add("active");
}

function showMessage(msg) {
  const msgEl = document.getElementById("successMsg");
  msgEl.textContent = msg;
  msgEl.classList.add("show");
  setTimeout(() => msgEl.classList.remove("show"), 2000);
}

function getRatingStars(rating) {
  return "⭐".repeat(rating) + "☆".repeat(5 - rating);
}

// ====== RENDERING FUNCTION ======
function renderListings(listings, containerId = "results") {
  const container = document.getElementById(containerId);
  container.innerHTML = "";

  if (listings.length === 0) {
    const emptyDiv = document.createElement("div");
    emptyDiv.className = "empty-state";
    emptyDiv.innerHTML = "<h3>📭 لا توجد نتائج</h3><p>حاول البحث عن شيء آخر أو أضف إعلانك الخاص</p>";
    container.appendChild(emptyDiv);
    return;
  }

  listings.forEach(property => {
    const card = document.createElement("div");
    card.className = "card";

    const isFav = favorites.includes(property.id);
    const isOwner = myProperties.some(p => p.id === property.id);

    let actionsHTML = `
      <a href="tel:${property.phone}" class="btn-call">📞 اتصل الآن</a>
      <button class="btn-fav" onclick="toggleFav(${property.id})">${isFav ? "❤️ مفضل" : "⭐ حفظ"}</button>
    `;

    if (isOwner) {
      actionsHTML += `
        <button class="btn-edit" onclick="openEditModal(${property.id})">✏️ تعديل</button>
      `;
    }

    card.innerHTML = `
      <div class="img-container">
        <img class="img" src="${property.img}" alt="${property.title}" onerror="this.src='https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?auto=format&fit=crop&w=800&q=60'" />
        ${property.isVerified ? '<span class="verified-badge">✅ موثق</span>' : ''}
      </div>
      <div class="card-content">
        <div class="title-row">
          <div class="title">${property.title}</div>
        </div>
        <div class="rating">${getRatingStars(property.rating || 0)}</div>
        <div class="price">${property.price.toLocaleString('ar-EG')} دج</div>
        <div class="meta">
          <div class="meta-item">📍 ${property.city}</div>
          <div class="meta-item">🏠 ${property.type}</div>
        </div>
        <div class="description">${property.description}</div>
        <div class="badges">
          <span class="badge">✨ جديد</span>
          <span class="badge">🌟 شعبي</span>
        </div>
        <div class="actions">
          ${actionsHTML}
          ${isOwner ? `<button class="btn-delete" onclick="deleteProperty(${property.id})">🗑️ حذف</button>` : ''}
        </div>
      </div>
    `;

    container.appendChild(card);
  });
}

// ====== SEARCH & FILTER ======
function search() {
  currentView = "home";
  updateNav();

  const q = document.getElementById("searchInput").value.toLowerCase();
  const city = document.getElementById("cityFilter").value;
  const type = document.getElementById("typeFilter").value;

  const allData = [...baseListings, ...myProperties];
  
  let filtered = allData.filter(item => {
    const matchCity = !city || item.city === city;
    const matchType = !type || item.type === type;
    const matchSearch = !q || item.title.toLowerCase().includes(q) || item.description.toLowerCase().includes(q);
    return matchCity && matchType && matchSearch;
  });

  renderListings(filtered);
}

// ====== FAVORITES ======
function toggleFav(id) {
  if (favorites.includes(id)) {
    favorites = favorites.filter(x => x !== id);
    showMessage("❌ تم الحذف من المفضلة");
  } else {
    favorites.push(id);
    showMessage("❤️ تم الحفظ في المفضلة");
  }
  localStorage.setItem("favorites", JSON.stringify(favorites));
  search();
}

function showFavorites() {
  currentView = "favorites";
  updateNav();

  const allData = [...baseListings, ...myProperties];
  const favListings = allData.filter(item => favorites.includes(item.id));
  renderListings(favListings);
}

// ====== MY LISTINGS ======
function showMyListings() {
  currentView = "mylistings";
  updateNav();
  renderListings(myProperties);
}

function deleteProperty(id) {
  if (confirm("هل أنت متأكد من حذف هذا الإعلان؟")) {
    myProperties = myProperties.filter(p => p.id !== id);
    localStorage.setItem("myProperties", JSON.stringify(myProperties));
    favorites = favorites.filter(f => f !== id);
    localStorage.setItem("favorites", JSON.stringify(favorites));
    showMessage("🗑️ تم حذف الإعلان بنجاح");
    showMyListings();
  }
}

// ====== ADD/EDIT PROPERTY ======
function saveProperty() {
  const title = document.getElementById("newTitle").value.trim();
  const city = document.getElementById("newCity").value;
  const type = document.getElementById("newType").value;
  const price = parseInt(document.getElementById("newPrice").value);
  const phone = document.getElementById("newPhone").value.trim();
  const description = document.getElementById("newDesc").value.trim();
  const img = document.getElementById("newImg").value.trim();

  if (!title || !price || !phone || !description) {
    alert("⚠️ يرجى ملء جميع الحقول المطلوبة!");
    return;
  }

  if (editingId) {
    // تعديل
    const index = myProperties.findIndex(p => p.id === editingId);
    if (index !== -1) {
      myProperties[index] = {
        ...myProperties[index],
        title,
        city,
        type,
        price,
        phone,
        description,
        img: img || myProperties[index].img
      };
      showMessage("✏️ تم تعديل الإعلان بنجاح!");
    }
  } else {
    // إضافة جديدة
    const newProperty = {
      id: Date.now(),
      title,
      city,
      type,
      price,
      phone,
      description,
      img: img || "https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?auto=format&fit=crop&w=800&q=60",
      isVerified: true,
      rating: 5
    };

    myProperties.push(newProperty);
    showMessage("🎉 تم نشر الإعلان بنجاح!");
  }

  localStorage.setItem("myProperties", JSON.stringify(myProperties));
  closeAddModal();
  showMyListings();
}

// ====== VIEW MANAGEMENT ======
function showHome() {
  currentView = "home";
  updateNav();
  document.getElementById("searchInput").value = "";
  document.getElementById("cityFilter").value = "";
  document.getElementById("typeFilter").value = "";
  search();
}

function updateNav() {
  document.querySelectorAll(".nav-item").forEach(item => {
    item.classList.remove("active");
  });

  const navItems = document.querySelectorAll(".nav-item");
  if (currentView === "home") navItems[0].classList.add("active");
  if (currentView === "favorites") navItems[2].classList.add("active");
  if (currentView === "mylistings") navItems[3].classList.add("active");
}

// تهيئة الصفحة
search();
</script>
