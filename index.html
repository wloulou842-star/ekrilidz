<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>أكريلي Ekrili v0.3 - منصة كراء المنازل</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* (تم الاحتفاظ بنفس تنسيقاتك السابقة لضمان نفس الشكل) */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Cairo', sans-serif; color: #e2e8f0; background: linear-gradient(120deg, #0b1220, #0f172a); min-height: 100vh; padding-bottom: 120px; }
    header { padding: 18px; text-align: center; background: rgba(15,23,42,0.8); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(59,130,246,0.2); }
    header h1 { font-size: 26px; background: linear-gradient(135deg, #3b82f6, #10b981); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .container { max-width: 700px; margin: auto; padding: 15px; }
    input, select { width: 100%; padding: 12px; border-radius: 10px; background: rgba(31,41,55,0.7); color: white; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 10px; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
    .modal.active { display: flex; }
    .modal-content { background: rgba(31,41,55,0.95); padding: 25px; border-radius: 15px; width: 100%; max-width: 400px; }
    .success-message { background: rgba(16,185,129,0.2); color: #4ade80; padding: 12px; border-radius: 8px; display: none; text-align: center; }
    .success-message.show { display: block; }
  </style>
</head>
<body>

<header><h1>🏠 أكريلي Ekrili</h1></header>

<div class="container">
  <div class="success-message" id="successMsg">✅ تم!</div>
  <div class="search-section">
    <input id="searchInput" placeholder="ابحث...">
    <button onclick="openAddModal()">➕ إضافة إعلان</button>
  </div>
  <div id="results"></div>
</div>

<div id="addModal" class="modal">
  <div class="modal-content">
    <input id="newTitle" placeholder="العنوان">
    <select id="newCity"><option value="الجزائر">الجزائر</option><option value="وهران">وهران</option></select>
    <select id="newType"><option value="F2">F2</option><option value="Villa">Villa</option></select>
    <input id="newPrice" type="number" placeholder="السعر">
    <input id="newPhone" placeholder="الهاتف">
    <textarea id="newDesc" placeholder="الوصف"></textarea>
    <button onclick="saveProperty()" style="background: #10b981; color:white; width:100%; padding:10px;">نشر 🚀</button>
    <button onclick="closeAddModal()" style="width:100%; margin-top:10px;">إلغاء</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDXp0NC0dV0QHFzWwovlEczI44wlJUEdSw",
    authDomain: "ekrilidz-af404.firebaseapp.com",
    projectId: "ekrilidz-af404",
    storageBucket: "ekrilidz-af404.firebasestorage.app",
    messagingSenderId: "945902801388",
    appId: "1:945902801388:web:5a79223f369ee0544df0c9",
    measurementId: "G-P19FP8BLJQ"
  };

  const app = initializeApp(firebaseConfig);
  window.db = getFirestore(app); // جعل db متاحاً عالمياً
</script>

<script>
  function openAddModal() { document.getElementById("addModal").classList.add("active"); }
  function closeAddModal() { document.getElementById("addModal").classList.remove("active"); }
  function showMessage(msg) {
    const el = document.getElementById("successMsg");
    el.textContent = msg; el.classList.add("show");
    setTimeout(() => el.classList.remove("show"), 2000);
  }

  async function saveProperty() {
    const title = document.getElementById("newTitle").value.trim();
    const city = document.getElementById("newCity").value;
    const type = document.getElementById("newType").value;
    const price = parseInt(document.getElementById("newPrice").value);
    const phone = document.getElementById("newPhone").value.trim();
    const desc = document.getElementById("newDesc").value.trim();

    if (!title || !price || !phone || !desc) { alert("يرجى ملء جميع الحقول"); return; }

    try {
      await addDoc(collection(window.db, "properties"), {
        title, city, type, price, phone, description: desc, createdAt: new Date()
      });
      closeAddModal();
      showMessage("🎉 تم النشر بنجاح!");
    } catch (e) {
      alert("خطأ في الاتصال بقاعدة البيانات");
    }
  }
</script>

</body>
</html>
