<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>أكريلي | منصة الإعلانات الذكية في الجزائر</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
  <style>
    :root {
      --green: #10b981;
      --green-light: #34d399;
      --green-dark: #059669;
      --green-glow: rgba(16,185,129,0.25);
      --bg: #040c08;
      --bg2: #071810;
      --glass: rgba(255,255,255,0.03);
      --border: rgba(16,185,129,0.12);
      --text: #f0fdf4;
      --text-muted: #86efac;
      --gold: #d4af37;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Cairo', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    /* ── خلفية ── */
    .bg-scene {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
    }
    .orb {
      position: absolute; border-radius: 50%; filter: blur(120px);
      animation: drift 14s ease-in-out infinite alternate;
    }
    .orb1 { width:700px; height:700px; background:radial-gradient(circle,rgba(16,185,129,0.12),transparent); top:-300px; right:-200px; }
    .orb2 { width:500px; height:500px; background:radial-gradient(circle,rgba(5,46,22,0.5),transparent); bottom:-200px; left:-150px; animation-delay:4s; }
    .orb3 { width:350px; height:350px; background:radial-gradient(circle,rgba(212,175,55,0.05),transparent); top:50%; left:30%; animation-delay:8s; }
    @keyframes drift {
      0% { transform: translate(0,0) scale(1); }
      100% { transform: translate(40px,25px) scale(1.08); }
    }

    .grid-bg {
      position: fixed; inset: 0;
      background-image: linear-gradient(rgba(16,185,129,0.025) 1px,transparent 1px), linear-gradient(90deg,rgba(16,185,129,0.025) 1px,transparent 1px);
      background-size: 60px 60px; z-index: 0;
    }

    /* ── Navbar ── */
    nav {
      position: fixed; top: 0; width: 100%; z-index: 100;
      padding: 16px 24px;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(4,12,8,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      font-size: 26px; font-weight: 900;
      background: linear-gradient(135deg, var(--green-light), var(--green));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    .nav-links { display: flex; gap: 8px; align-items: center; }

    .nav-btn {
      padding: 9px 20px; border-radius: 10px; font-family: 'Cairo', sans-serif;
      font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.3s;
      text-decoration: none;
    }
    .nav-btn-ghost {
      background: transparent; border: 1px solid var(--border); color: var(--text-muted);
    }
    .nav-btn-ghost:hover { border-color: var(--green); color: var(--green-light); }
    .nav-btn-fill {
      background: linear-gradient(135deg, var(--green), var(--green-dark));
      border: none; color: white;
      box-shadow: 0 4px 20px var(--green-glow);
    }
    .nav-btn-fill:hover { transform: translateY(-1px); box-shadow: 0 8px 30px var(--green-glow); }

    /* ── Hero ── */
    .hero {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center;
      padding: 120px 24px 60px;
    }

    .hero-badge {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 18px; border-radius: 100px;
      background: rgba(16,185,129,0.08);
      border: 1px solid rgba(16,185,129,0.2);
      font-size: 12px; color: var(--green-light);
      margin-bottom: 24px; letter-spacing: 1px;
      animation: fadeDown 0.6s ease both;
    }
    .hero-badge span { width:6px; height:6px; border-radius:50%; background:var(--green); animation: blink 2s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    .hero-title {
      font-size: clamp(42px, 8vw, 88px);
      font-weight: 900; line-height: 1;
      margin-bottom: 12px;
      background: linear-gradient(160deg, #ffffff 0%, var(--green-light) 50%, var(--green) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      animation: fadeDown 0.7s ease 0.1s both;
    }

    .hero-subtitle {
      font-size: clamp(14px, 2.5vw, 20px);
      color: rgba(134,239,172,0.6);
      max-width: 500px; line-height: 1.7;
      margin-bottom: 40px;
      animation: fadeDown 0.7s ease 0.2s both;
    }

    @keyframes fadeDown {
      from { opacity:0; transform:translateY(-20px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .hero-actions {
      display: flex; gap: 14px; flex-wrap: wrap; justify-content: center;
      margin-bottom: 60px;
      animation: fadeDown 0.7s ease 0.3s both;
    }

    .btn-hero-main {
      padding: 16px 36px; border-radius: 14px; font-family: 'Cairo',sans-serif;
      font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.3s;
      background: linear-gradient(135deg, var(--green), var(--green-dark));
      border: none; color: white;
      box-shadow: 0 8px 40px var(--green-glow);
      text-decoration: none; display: inline-flex; align-items: center; gap: 8px;
    }
    .btn-hero-main:hover { transform: translateY(-3px); box-shadow: 0 14px 50px var(--green-glow); }

    .btn-hero-ghost {
      padding: 16px 36px; border-radius: 14px; font-family: 'Cairo',sans-serif;
      font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.3s;
      background: transparent; border: 1px solid rgba(16,185,129,0.25); color: var(--text-muted);
      text-decoration: none; display: inline-flex; align-items: center; gap: 8px;
    }
    .btn-hero-ghost:hover { border-color: var(--green); color: var(--green-light); background: rgba(16,185,129,0.05); }

    /* ── إحصائيات ── */
    .stats {
      display: flex; gap: 40px; flex-wrap: wrap; justify-content: center;
      animation: fadeDown 0.7s ease 0.4s both;
    }
    .stat-item { text-align: center; }
    .stat-num {
      font-size: 32px; font-weight: 900;
      background: linear-gradient(135deg, var(--green-light), var(--green));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .stat-label { font-size: 12px; color: rgba(134,239,172,0.5); margin-top: 2px; }

    /* ── شريط بحث ── */
    .search-section {
      position: relative; z-index: 1;
      padding: 0 24px 80px;
      display: flex; justify-content: center;
    }

    .search-box {
      width: 100%; max-width: 700px;
      background: linear-gradient(145deg, rgba(7,24,16,0.9), rgba(4,12,8,0.95));
      border: 1px solid rgba(16,185,129,0.2);
      border-radius: 20px; padding: 20px 24px;
      backdrop-filter: blur(20px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 0 40px rgba(16,185,129,0.05) inset;
    }

    .search-input-wrap {
      display: flex; gap: 12px; align-items: center;
      background: rgba(0,0,0,0.3); border: 1px solid rgba(16,185,129,0.12);
      border-radius: 12px; padding: 14px 18px; margin-bottom: 16px;
      transition: all 0.3s;
    }
    .search-input-wrap:focus-within {
      border-color: var(--green);
      box-shadow: 0 0 20px rgba(16,185,129,0.1);
    }
    .search-input-wrap i { color: rgba(16,185,129,0.5); font-size: 16px; }
    .search-input-wrap input {
      flex:1; background:transparent; border:none; outline:none;
      color: var(--text); font-family:'Cairo',sans-serif; font-size:15px;
    }
    .search-input-wrap input::placeholder { color: rgba(134,239,172,0.3); }

    .search-filters {
      display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 10px;
    }

    .filter-select {
      padding: 11px 14px; background: rgba(0,0,0,0.3);
      border: 1px solid rgba(16,185,129,0.1); border-radius: 10px;
      color: var(--text); font-family:'Cairo',sans-serif; font-size:13px;
      outline: none; transition: all 0.3s; cursor: pointer;
    }
    .filter-select:focus { border-color: var(--green); }
    .filter-select option { background: var(--bg2); }

    .btn-search {
      padding: 11px 24px; background: linear-gradient(135deg, var(--green), var(--green-dark));
      border: none; border-radius: 10px; color: white;
      font-family:'Cairo',sans-serif; font-size:13px; font-weight:700;
      cursor:pointer; transition:all 0.3s; white-space:nowrap;
    }
    .btn-search:hover { transform:translateY(-1px); box-shadow:0 6px 20px var(--green-glow); }

    /* ── الأقسام ── */
    .section {
      position: relative; z-index: 1;
      padding: 60px 24px;
      max-width: 1200px; margin: 0 auto;
    }

    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 32px;
    }
    .section-title { font-size: 24px; font-weight: 800; }
    .section-title span { color: var(--green); }
    .section-link {
      font-size: 13px; color: var(--green); text-decoration: none;
      display: flex; align-items: center; gap: 6px; transition: gap 0.3s;
    }
    .section-link:hover { gap: 10px; }

    /* ── الأقسام الرئيسية (categories) ── */
    .cats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }

    .cat-card {
      background: linear-gradient(145deg, rgba(7,24,16,0.8), rgba(4,12,8,0.9));
      border: 1px solid var(--border);
      border-radius: 18px; padding: 24px 16px;
      text-align: center; cursor: pointer; transition: all 0.3s;
      text-decoration: none; color: var(--text);
    }
    .cat-card:hover {
      border-color: rgba(16,185,129,0.4);
      transform: translateY(-5px);
      box-shadow: 0 12px 40px rgba(16,185,129,0.12);
      background: linear-gradient(145deg, rgba(16,185,129,0.06), rgba(4,12,8,0.9));
    }
    .cat-icon {
      width: 56px; height: 56px; margin: 0 auto 14px;
      border-radius: 16px; display: flex; align-items: center; justify-content: center;
      font-size: 24px;
      background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.15);
    }
    .cat-name { font-size: 14px; font-weight: 700; }
    .cat-count { font-size: 12px; color: rgba(134,239,172,0.4); margin-top: 4px; }

    /* ── بطاقات الإعلانات ── */
    .listings-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px,1fr));
      gap: 20px;
    }

    .listing-card {
      background: linear-gradient(145deg, rgba(7,24,16,0.8), rgba(4,12,8,0.9));
      border: 1px solid var(--border); border-radius: 20px;
      overflow: hidden; transition: all 0.3s; cursor: pointer;
    }
    .listing-card:hover {
      border-color: rgba(16,185,129,0.35);
      transform: translateY(-6px);
      box-shadow: 0 16px 50px rgba(16,185,129,0.12);
    }

    .card-img {
      position: relative; height: 200px; overflow: hidden;
    }
    .card-img img {
      width:100%; height:100%; object-fit:cover; transition: transform 0.5s;
    }
    .listing-card:hover .card-img img { transform: scale(1.05); }
    .card-img-overlay {
      position:absolute; inset:0;
      background: linear-gradient(to top, rgba(4,12,8,0.8) 0%, transparent 60%);
    }
    .card-badge {
      position:absolute; top:12px; right:12px;
      padding: 5px 12px; border-radius: 8px; font-size: 11px; font-weight: 700;
      background: rgba(16,185,129,0.9); color: white;
    }
    .card-fav {
      position:absolute; top:12px; left:12px;
      width:32px; height:32px; border-radius:8px;
      background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; transition:all 0.3s; font-size:14px;
    }
    .card-fav:hover { background: rgba(239,68,68,0.3); border-color: #ef4444; }

    .card-body { padding: 18px; }
    .card-title { font-size: 16px; font-weight: 800; margin-bottom: 8px; line-height: 1.3; }
    .card-location { font-size: 13px; color: rgba(134,239,172,0.5); margin-bottom: 12px; }
    .card-location i { color: var(--green); margin-left: 4px; }
    .card-price { font-size: 20px; font-weight: 900; color: var(--green-light); }
    .card-price span { font-size: 12px; color: rgba(134,239,172,0.4); font-weight: 400; }

    /* ── لماذا أكريلي ── */
    .features-grid {
      display: grid; grid-template-columns: repeat(4,1fr); gap: 16px;
    }

    .feature-card {
      background: linear-gradient(145deg, rgba(7,24,16,0.7), rgba(4,12,8,0.9));
      border: 1px solid var(--border); border-radius: 20px;
      padding: 28px 20px; text-align: center;
    }
    .feature-icon {
      width: 60px; height: 60px; margin: 0 auto 18px;
      border-radius: 18px; display:flex; align-items:center; justify-content:center;
      font-size: 26px; border: 1px solid rgba(16,185,129,0.2);
      background: rgba(16,185,129,0.08);
    }
    .feature-title { font-size: 16px; font-weight: 800; margin-bottom: 8px; }
    .feature-desc { font-size: 13px; color: rgba(134,239,172,0.45); line-height: 1.6; }

    /* ── CTA للمؤجرين ── */
    .cta-section {
      position: relative; z-index: 1;
      margin: 0 24px 80px;
      border-radius: 28px; padding: 60px 40px;
      background: linear-gradient(135deg, rgba(5,46,22,0.6), rgba(7,24,16,0.9));
      border: 1px solid rgba(16,185,129,0.2);
      text-align: center; overflow: hidden;
    }
    .cta-glow {
      position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
      width:400px; height:400px;
      background: radial-gradient(circle, rgba(16,185,129,0.1), transparent);
      border-radius:50%; pointer-events:none;
    }
    .cta-title { font-size: clamp(24px,4vw,40px); font-weight:900; margin-bottom:12px; }
    .cta-title span { color: var(--green-light); }
    .cta-desc { font-size:15px; color:rgba(134,239,172,0.55); max-width:500px; margin:0 auto 32px; line-height:1.7; }

    /* ── Bottom Nav (موبايل) ── */
    .bottom-nav {
      display: none;
      position: fixed; bottom: 0; width: 100%;
      background: rgba(4,12,8,0.95); backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      padding: 12px 0 20px; z-index: 100;
      justify-content: space-around;
    }
    .bnav-item {
      text-align: center; font-size: 10px; color: rgba(134,239,172,0.4);
      cursor: pointer; transition: all 0.3s; flex:1;
      text-decoration: none; display: flex; flex-direction: column; align-items: center; gap: 4px;
    }
    .bnav-item.active, .bnav-item:hover { color: var(--green-light); }
    .bnav-item i { font-size: 18px; }

    .bnav-add {
      width: 50px; height: 50px; border-radius: 16px; margin-top: -20px;
      background: linear-gradient(135deg, var(--green), var(--green-dark));
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; cursor: pointer;
      box-shadow: 0 8px 30px var(--green-glow);
      text-decoration: none; color: white;
    }

    /* ── Footer ── */
    footer {
      position: relative; z-index: 1;
      text-align: center; padding: 30px;
      border-top: 1px solid var(--border);
      color: rgba(134,239,172,0.25); font-size: 12px;
    }
    footer span { color: var(--green); }

    /* ── Loading ── */
    .loading-cards {
      display: grid; grid-template-columns: repeat(auto-fill,minmax(300px,1fr)); gap: 20px;
    }
    .skeleton {
      background: rgba(16,185,129,0.04); border: 1px solid var(--border);
      border-radius: 20px; height: 300px;
      animation: shimmer 1.8s ease-in-out infinite;
    }
    @keyframes shimmer {
      0%,100% { opacity: 0.4; }
      50% { opacity: 0.8; }
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .cats-grid { grid-template-columns: repeat(4,1fr); gap: 10px; }
      .cat-card { padding: 16px 8px; }
      .cat-icon { width:44px; height:44px; font-size:18px; }
      .cat-name { font-size: 12px; }
      .features-grid { grid-template-columns: repeat(2,1fr); }
      .search-filters { grid-template-columns: 1fr 1fr; }
      .btn-search { grid-column: span 2; }
      .bottom-nav { display: flex; }
      body { padding-bottom: 80px; }
      .nav-links .nav-btn-ghost { display: none; }
      .cta-section { margin: 0 16px 80px; padding: 40px 20px; }
    }
  </style>
</head>
<body>

<div class="bg-scene">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>
<div class="grid-bg"></div>

<!-- Navbar -->
<nav>
  <div class="nav-logo">أكريلي</div>
  <div class="nav-links">

<!-- Hero -->

    <a href="listings.html" class="btn-hero-main">

    <a href="login.html" class="btn-hero-ghost">

    </a>

<!-- شريط البحث -->

      </select>
      <button class="btn-search" onclick="goSearch()">
        <i class="fa-solid fa-arrow-left"></i> بحث
      </button>
    </div>
  </div>
</div>

<!-- الأقسام الرئيسية -->
<div class="section">
  <div class="section-header">
    <div class="section-title">الأقسام <span>الرئيسية</span></div>
    <a href="listings.html" class="section-link">عرض الكل <i class="fa-solid fa-arrow-left"></i></a>
  </div>
  <div class="cats-grid">
    <a href="listings.html?cat=عقارات" class="cat-card">
      <div class="cat-icon">🏠</div>

      <div class="cat-count">إيجار وبيع</div>
    </a>
  </div>
</div>

<div class="bottom-nav">
  <a href="index.html" class="nav-link">
    <i class="fa-solid fa-house"></i>
    <span>الرئيسية</span>
  </a>
  <a href="listings.html" class="nav-link">
    <i class="fa-solid fa-compass"></i>
    <span>الإعلانات</span>
  </a>
